name: Release

# Tag-driven release: push a tag `vX.Y.Z` (on a commit reachable from main)
# and this workflow builds and validates EVERYTHING from the exact tag SHA,
# then publishes: npm (root, then pi), then the GitHub Release (Desktop
# artifacts + checksums), then opens the version-bump PR to protected main.
#
# Binding ordering (desktop-dist contract):
#   1. checkout the EXACT tag SHA (never a branch ref);
#   2. derive X.Y.Z from the tag into root, packages/pi, and packages/desktop
#      manifests/locks (`npm version --no-git-tag-version`);
#   3. run ALL build/test/smoke steps — kernel tests, pack checks, tarball
#      clean-room smoke, Desktop build + artifact inventory — BEFORE any
#      publication;
#   4. publish @oas-framework/oas, then @oas-framework/pi;
#   5. create the public GitHub Release LAST (after npm), attaching Desktop
#      artifacts, SHA256SUMS.txt, and provenance attestations;
#   6. open the bump PR covering all three package manifests/locks.
# A failed GitHub publication is retried from the same tag/assets — never
# retagged.
#
# Requires the repo secret NPM_TOKEN: a granular npm automation token with
# read/write on the @oas-framework packages (Settings → Secrets → Actions).

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------- npm side
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      # Exact tag SHA — releases are built from the tag, not from a moving
      # branch head. The on-main check below still gates provenance.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Verify the tag is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "::error::Tag ${GITHUB_REF_NAME} is not on main — releases cut from main only."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Derive version from tag
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Bump all three packages (root, pi, desktop)
        run: |
          npm version "${{ steps.v.outputs.version }}" --no-git-tag-version
          (cd packages/pi && npm version "${{ steps.v.outputs.version }}" --no-git-tag-version)
          (cd packages/desktop && npm version "${{ steps.v.outputs.version }}" --no-git-tag-version)

      - name: Syntax-check all shipped JS
        run: |
          for f in $(git ls-files 'bin/*.mjs' 'lib/*.mjs' 'capabilities/*/bin/*.mjs' 'capabilities/*/skills/*/scripts/*.mjs'); do
            node --check "$f" || { echo "::error::syntax error in $f"; exit 1; }
          done

      - name: Test capability resolution and package commands
        run: |
          npm run check
          npm test

      - name: Sanity-check tarballs
        run: |
          npm run pack:check
          npm pack --dry-run 2>&1 | grep -q "name: @oas-framework/oas" || { echo "::error::kernel pack check failed"; exit 1; }
          # never ship deployment state (top-level agents/ or a workspace config)
          if npm pack --dry-run 2>&1 | grep -E "^npm notice" | grep -qE " (agents/|oas-config\.yaml)"; then
            echo "::error::kernel tarball contains workspace state"; exit 1
          fi
          cd packages/pi
          npm pack --dry-run 2>&1 | grep -q "name: @oas-framework/pi" || { echo "::error::adapter pack check failed"; exit 1; }

      - name: Clean-room tarball smoke (install packed artifacts outside the checkout)
        run: npm run smoke:tarball

      - name: Probe the Desktop CLI API v1 contract from the bumped tree
        run: |
          OUT="$(node bin/oas.mjs version --json)"
          EXPECTED='{"schemaVersion":1,"name":"@oas-framework/oas","version":"${{ steps.v.outputs.version }}","desktopApi":1}'
          [ "$OUT" = "$EXPECTED" ] || { echo "::error::version --json probe mismatch: $OUT"; exit 1; }

      - name: Upload bumped manifests for the version-bump PR
        uses: actions/upload-artifact@v4
        with:
          name: bumped-manifests
          path: |
            package.json
            package-lock.json
            packages/pi/package.json
            packages/desktop/package.json
            packages/desktop/package-lock.json

  # ------------------------------------------------------------ Desktop side
  # Interface seam owned by the Desktop engineer: each matrix job checks out
  # the exact tag SHA, bumps packages/desktop to the tag version, builds the
  # unsigned installers via `npm run dist` (electron-builder internals are the
  # Desktop package's concern), and uploads a `desktop-<os>-<arch>` artifact
  # containing only the distributable files for that platform.
  desktop-build:
    needs: build-and-test
    strategy:
      matrix:
        include:
          - os: macos-14          # macOS arm64: DMG + ZIP
            arch: arm64
          - os: macos-13          # macOS x64: DMG + ZIP
            arch: x64
          - os: ubuntu-latest     # Linux x64: AppImage + DEB
            arch: x64
    runs-on: ${{ matrix.os }}
    env:
      # 0.18.0 ships unsigned/not notarized — disable certificate discovery.
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Bump desktop to the tag version
        working-directory: packages/desktop
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version

      - name: Build Desktop distributables
        working-directory: packages/desktop
        run: |
          npm ci
          npm test
          npm run dist

      - name: Installed-artifact smoke
        working-directory: packages/desktop
        run: npm run dist:smoke --if-present

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}-${{ matrix.arch }}
          path: packages/desktop/dist/oas-desktop-*
          if-no-files-found: error

  # -------------------------------------------------------------- publication
  # Publication starts ONLY after every build/test/smoke job above is green.
  publish:
    needs: [build-and-test, desktop-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Bump all three packages (root, pi, desktop)
        run: |
          npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version
          (cd packages/pi && npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version)
          (cd packages/desktop && npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version)

      - name: Publish @oas-framework/oas
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @oas-framework/pi
        run: npm publish --access public
        working-directory: packages/pi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Download Desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: release-assets
          merge-multiple: true

      - name: Checksums
        working-directory: release-assets
        run: shasum -a 256 * > SHA256SUMS.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: release-assets/*

      # GitHub Release LAST: npm is already published; a failure here is
      # retried from the same tag/assets (re-run this job), never retagged.
      - name: Create the GitHub Release
        run: |
          gh release create "${GITHUB_REF_NAME}" release-assets/* \
            --title "OAS ${GITHUB_REF_NAME}" \
            --notes-file docs/release-notes/${GITHUB_REF_NAME}.md \
            --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Open the version-bump PR (all three manifests — main is protected)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json packages/pi/package.json packages/desktop/package.json packages/desktop/package-lock.json
          git commit -m "release: ${GITHUB_REF_NAME} [skip ci]"
          BRANCH="release-bump/${GITHUB_REF_NAME}"
          git push origin "HEAD:${BRANCH}"
          gh pr create --base main --head "${BRANCH}" \
            --title "release: ${GITHUB_REF_NAME} version bump" \
            --body "Automated version bump (root, pi, desktop) from the ${GITHUB_REF_NAME} release run. Zero-approval merge per branch protection."
          gh pr merge "${BRANCH}" --squash --delete-branch
        env:
          GH_TOKEN: ${{ github.token }}
