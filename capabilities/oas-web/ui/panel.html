<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>oas — agents</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  /* ── Semantic design tokens. Dark and light palettes both hold WCAG AA
     (≥4.5:1) for body text; muted text stays ≥4.5:1 against panel surfaces. ── */
  :root, [data-theme="dark"] {
    --bg: #0e1116;          /* app background */
    --surface: #161b22;     /* cards, sidebar */
    --surface-2: #1c2129;   /* hover / raised */
    --border: #2d333c;
    --fg: #e6edf3;          /* primary text  (13.9:1 on bg) */
    --muted: #9aa4b2;       /* secondary text (5.6:1 on surface) */
    --faint: #6e7681;       /* tertiary/disabled */
    --accent: #4493f8;      /* interactive */
    --accent-fg: #ffffff;
    --ok: #3fb950; --warn: #d29922; --danger: #f85149;
    --chip-bg: #21262e; --chip-fg: #adb6c2;
    --sel: #1f6feb26;       /* selected wash */
    --term-bg: #0a0d12;     /* session surface follows the theme */
    --term-fg: #e6edf3;
    --term-sel: #264f78; /* used by #term ::selection */
    --shadow: 0 1px 3px rgb(0 0 0 / .4);
  }
  [data-theme="light"] {
    /* Slightly solarised light — warm paper surfaces (Solarized base3/base2
       tints), ink and accents kept AA-readable on them. */
    --bg: #f3eddd;
    --surface: #fdf6e3;
    --surface-2: #f0e9d2;
    --border: #ddd4bc;
    --fg: #37424a;          /* 9.9:1 on surface */
    --muted: #657b83;       /* solarized base00 — 4.9:1 */
    --faint: #93a1a1;       /* solarized base1 */
    --accent: #1f6fb2;
    --accent-fg: #ffffff;
    --ok: #667f00; --warn: #9a6a00; --danger: #c73f3f;
    --chip-bg: #ede5cc; --chip-fg: #62707a;
    --sel: #1f6fb21f;
    --term-bg: #fdf6e3;     /* solarized-light session surface */
    --term-fg: #586e75;
    --term-sel: #d3c9a8; /* used by #term ::selection */
    --shadow: 0 1px 3px rgb(88 110 117 / .14);
  }

  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--fg); height: 100vh; display: flex; flex-direction: column;
         font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         -webkit-font-smoothing: antialiased; }

  /* ── Header ── */
  header { padding: 0 16px; height: 40px; border-bottom: 1px solid var(--border); display: flex; align-items: center;
           gap: 12px; background: var(--surface); flex: none; }
  header h1 { font-size: 13px; margin: 0; font-weight: 650; letter-spacing: .01em; }
  header h1 .logo { color: var(--accent); }
  .hmeta { color: var(--muted); font-size: 12px; }
  .spacer { flex: 1; }
  .iconbtn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 8px;
             width: 28px; height: 28px; cursor: pointer; font-size: 14px; line-height: 1; }
  .iconbtn:hover { color: var(--fg); border-color: var(--faint); }
  #wssel { background: var(--surface-2); color: var(--fg); border: 1px solid var(--border); border-radius: 8px;
           padding: 3px 8px; font: 12px inherit; font-weight: 600; cursor: pointer; outline: none; }
  #wssel:hover, #wssel:focus { border-color: var(--accent); }

  main { flex: 1; display: flex; min-height: 0; }

  /* ── Sidebar / roster ── */
  #side { width: 340px; min-width: 280px; max-width: 420px; border-right: 1px solid var(--border);
          background: var(--surface); display: flex; flex-direction: column; }
  #side.collapsed { display: none; }
  #filterbar { padding: 12px 12px 8px; display: flex; gap: 8px; }
  #filter { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--fg);
            border-radius: 8px; padding: 7px 11px; font-size: 13px; outline: none; }
  #filter:focus { border-color: var(--accent); }
  #filter::placeholder { color: var(--faint); }
  #groups { flex: 1; overflow-y: auto; padding: 0 8px 12px; }

  .group { margin-top: 10px; }
  .ghead { display: flex; align-items: center; gap: 8px; padding: 4px 8px; cursor: pointer; user-select: none;
           color: var(--muted); font-size: 11px; font-weight: 650; text-transform: uppercase; letter-spacing: .06em; }
  .ghead:hover { color: var(--fg); }
  .ghead .tri { transition: transform .12s; font-size: 9px; }
  .group.closed .tri { transform: rotate(-90deg); }
  .ghead .count { margin-left: auto; font-weight: 500; color: var(--faint); text-transform: none; letter-spacing: 0; }
  .group.closed .glist { display: none; }

  .repo { margin: 2px 0 2px 6px; }
  .rhead { color: var(--faint); font-size: 11.5px; padding: 5px 8px 2px; font-weight: 600; }

  .inst { padding: 8px 10px 8px 12px; border-radius: 8px; cursor: pointer; margin: 1px 0;
          border: 1px solid transparent; position: relative; }
  .inst:hover { background: var(--surface-2); }
  .inst.sel { background: var(--sel); border-color: var(--accent); }
  .inst.idle { opacity: .62; }
  .inst.child { margin-left: 18px; }
  .inst.child::before { content: ""; position: absolute; left: -10px; top: 0; bottom: 50%; width: 9px;
                        border-left: 1px solid var(--border); border-bottom: 1px solid var(--border);
                        border-bottom-left-radius: 6px; }
  .iname { font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 7px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--faint); flex: none; }
  .dot.on { background: var(--ok); box-shadow: 0 0 0 3px color-mix(in srgb, var(--ok) 22%, transparent); }
  .itask { color: var(--muted); font-size: 12px; margin-top: 3px; overflow: hidden; text-overflow: ellipsis;
           white-space: nowrap; }
  .imeta { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; align-items: center; }
  .chip { background: var(--chip-bg); color: var(--chip-fg); border-radius: 999px; font-size: 10.5px;
          padding: 1px 8px; font-weight: 550; }
  .chip.dirty { color: var(--warn); }
  .chip.rt { color: var(--accent); }

  /* ── Available agents (souls) — spawnable from the panel ── */
  .soul { padding: 8px 10px 8px 12px; border-radius: 8px; margin: 1px 0; border: 1px solid transparent; }
  .soul:hover { background: var(--surface-2); }
  .soul .iname { font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 7px; }
  .soul .sdesc { color: var(--muted); font-size: 12px; margin-top: 3px; }
  .spawnbtn { margin-left: auto; flex: none; background: none; border: 1px solid var(--border); color: var(--accent);
              border-radius: 6px; padding: 1px 9px; font: 11.5px inherit; font-weight: 600; cursor: pointer; }
  .spawnbtn:hover { border-color: var(--accent); background: var(--sel); }
  .spawnbtn:disabled { color: var(--faint); border-color: var(--border); cursor: default; background: none; }

  /* ── Main view — up to MAX_PANES side-by-side split panes, each a full
     session view (compact header + terminal); one focused pane receives
     keyboard input. ── */
  #view { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); }
  #panes { flex: 1; display: flex; min-height: 0; }
  .pane { flex: 1 1 0; min-width: 0; display: flex; flex-direction: column; border-left: 1px solid var(--border); }
  .pane:first-child { border-left: none; }
  .pane.focused .phead { box-shadow: inset 0 2px 0 var(--accent); }
  .phead { padding: 0 12px; height: 32px; border-bottom: 1px solid var(--border); background: var(--surface);
           display: flex; align-items: center; gap: 8px; font-size: 12.5px; overflow: hidden; }
  .phead .title { font-weight: 650; font-size: 13px; flex: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .phead .meta { color: var(--muted); font-size: 11.5px; font-weight: 500; flex: 1; min-width: 0;
                 overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .phead .meta b { color: var(--fg); font-weight: 550; }
  .phead .actions { margin-left: auto; flex: none; display: flex; gap: 6px; }
  .phead .pbtn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 13px;
                 border-radius: 5px; padding: 2px 6px; }
  .phead .pbtn:hover { color: var(--fg); background: var(--surface-2); }
  .badge { font-size: 10px; padding: 1px 7px; border-radius: 999px; font-weight: 600; flex: none; }
  .badge.on { background: color-mix(in srgb, var(--ok) 16%, transparent); color: var(--ok); }
  .badge.off { background: var(--chip-bg); color: var(--muted); }

  /* ── Terminal view — a faithful mirror of the tmux pane: the raw ANSI
     capture rendered as a monospace grid (scrollback + live screen), with
     the real cursor. No transcript reconstruction — what tmux shows is
     what you see. ── */
  .term { flex: 1; overflow: auto; padding: 14px 18px; outline: none; position: relative;
          background: var(--term-bg); color: var(--term-fg);
          font: 12.5px/1.35 "SF Mono", ui-monospace, SFMono-Regular, Menlo, monospace; }
  .term.focused { box-shadow: inset 0 0 0 2px color-mix(in srgb, var(--accent) 55%, transparent); }
  .tgrid { white-space: pre; width: max-content; min-width: 100%; }
  .tgrid .trow { min-height: 1.35em; }
  .tgrid .cur { background: var(--term-fg); color: var(--term-bg); }
  .term .scrollmark { border-bottom: 1px dashed color-mix(in srgb, var(--term-fg) 25%, transparent);
                      margin: 4px 0 6px; }
  .keyhint { position: sticky; bottom: 0; float: right; margin: 0 0 0 auto; pointer-events: none;
             font: 10.5px -apple-system, sans-serif; color: var(--term-bg);
             background: color-mix(in srgb, var(--accent) 85%, var(--term-fg));
             border-radius: 6px; padding: 2px 9px; opacity: 0; transition: opacity .15s; }
  .term.focused .keyhint { opacity: .92; }

  /* ── Loading states ── */
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100% { opacity: .35; } 50% { opacity: 1; } }
  .spinner { width: 14px; height: 14px; border: 2px solid color-mix(in srgb, var(--term-fg) 25%, transparent);
             border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite;
             display: inline-block; vertical-align: -2px; }
  .loading-block { display: flex; align-items: center; gap: 10px; justify-content: center;
                   padding: 48px 0; color: color-mix(in srgb, var(--term-fg) 60%, transparent);
                   font: 13px -apple-system, sans-serif; }

  .empty { color: var(--muted); text-align: center; padding: 60px 30px; font-size: 13.5px;
           font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; white-space: normal; }
  .empty .big { font-size: 32px; display: block; margin-bottom: 12px; opacity: .5; }
  .empty code { background: var(--chip-bg); border-radius: 6px; padding: 1px 7px; font-size: 12px; }

  /* ANSI 16-color palette — fg (.aN) and bg (.bN) classes. Dark-surface set,
     with a solarized remap for the light theme so base colors stay readable. */
  .a30{color:#768390}.a31{color:#ff7b72}.a32{color:#4ac26b}.a33{color:#d9a032}.a34{color:#6cb2ff}.a35{color:#c297ff}.a36{color:#4ed1db}.a37{color:#c3ccd6}
  .a90{color:#8b949e}.a91{color:#ffa198}.a92{color:#63e084}.a93{color:#edbb4a}.a94{color:#8cc5ff}.a95{color:#d5b3ff}.a96{color:#70e0e8}.a97{color:#f5f9ff}
  .b30{background:#768390}.b31{background:#ff7b72}.b32{background:#4ac26b}.b33{background:#d9a032}.b34{background:#6cb2ff}.b35{background:#c297ff}.b36{background:#4ed1db}.b37{background:#c3ccd6}
  .b90{background:#8b949e}.b91{background:#ffa198}.b92{background:#63e084}.b93{background:#edbb4a}.b94{background:#8cc5ff}.b95{background:#d5b3ff}.b96{background:#70e0e8}.b97{background:#f5f9ff}
  [data-theme="light"] .a30{color:#93a1a1}[data-theme="light"] .a31{color:#dc322f}[data-theme="light"] .a32{color:#859900}[data-theme="light"] .a33{color:#b58900}
  [data-theme="light"] .a34{color:#268bd2}[data-theme="light"] .a35{color:#d33682}[data-theme="light"] .a36{color:#2aa198}[data-theme="light"] .a37{color:#586e75}
  [data-theme="light"] .a90{color:#839496}[data-theme="light"] .a91{color:#cb4b16}[data-theme="light"] .a92{color:#6b7f00}[data-theme="light"] .a93{color:#8f6c00}
  [data-theme="light"] .a94{color:#1f6fb2}[data-theme="light"] .a95{color:#b02e6d}[data-theme="light"] .a96{color:#1f8a82}[data-theme="light"] .a97{color:#37424a}
  [data-theme="light"] .b30{background:#93a1a1}[data-theme="light"] .b31{background:#dc322f}[data-theme="light"] .b32{background:#859900}[data-theme="light"] .b33{background:#b58900}
  [data-theme="light"] .b34{background:#268bd2}[data-theme="light"] .b35{background:#d33682}[data-theme="light"] .b36{background:#2aa198}[data-theme="light"] .b37{background:#586e75}
  [data-theme="light"] .b90{background:#839496}[data-theme="light"] .b91{background:#cb4b16}[data-theme="light"] .b92{background:#6b7f00}[data-theme="light"] .b93{background:#8f6c00}
  [data-theme="light"] .b94{background:#1f6fb2}[data-theme="light"] .b95{background:#b02e6d}[data-theme="light"] .b96{background:#1f8a82}[data-theme="light"] .b97{background:#37424a}
  /* reverse-video with default colors: swap the terminal fg/bg tokens */
  .fdef{color:var(--term-bg)}.bdef{background:var(--term-fg)}
  /* Text selection: theme-aware everywhere; the terminal surface uses its
     dedicated --term-sel token (app-wide rule first so the terminal-specific
     one wins by source order + specificity). */
  ::selection { background: color-mix(in srgb, var(--accent) 30%, var(--bg)); color: var(--fg); }
  .term ::selection, .term::selection { background: var(--term-sel); color: inherit; }
  .ab{font-weight:700}.ad{opacity:.65}.ai{font-style:italic}.au{text-decoration:underline}
</style>
</head>
<body>
<header>
  <button class="iconbtn" id="sidebtn" title="Toggle sidebar (Ctrl+B)">☰</button>
  <h1><span class="logo">●</span> oas agents</h1>
  <select id="wssel" style="display:none"></select>
  <span class="hmeta" id="teamline"></span>
  <span class="spacer"></span>
  <span class="hmeta" id="stamp"></span>
  <button class="iconbtn" id="themebtn" title="Toggle light/dark">◐</button>
</header>
<main>
  <div id="side">
    <div id="filterbar"><input id="filter" placeholder="Filter agents, repos, tasks…" autocomplete="off"></div>
    <div id="groups"></div>
  </div>
  <div id="view">
    <div id="panes"></div>
  </div>
</main>
<script>
const $ = (id) => document.getElementById(id);
let panel = { instances: [] };
let souls = { agents: [] };
const MAX_PANES = 3;
let panes = [];          // [{ id, sel, gen, lastSig, fastUntil, keyQueue, keyFlush, el, headEl, termEl }]
let focusedId = null;    // pane id receiving keyboard input
let paneSeq = 0;
const focusedPane = () => panes.find(p => p.id === focusedId) || panes[0];
let filterText = "";
const closedGroups = new Set(JSON.parse(localStorage.getItem("oasweb.closed") || "[]"));

/* ── theme ── */
const savedTheme = localStorage.getItem("oasweb.theme");
const sysDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
document.documentElement.dataset.theme = savedTheme || (sysDark ? "dark" : "light");
$("themebtn").onclick = () => {
  const next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
  document.documentElement.dataset.theme = next;
  localStorage.setItem("oasweb.theme", next);
  // adaptBg's fold depends on the theme: invalidate every pane's render
  // signature and repaint so cached captures re-render for the new theme.
  panes.forEach((p) => { p.lastSig = ""; if (p.sel) refreshTerm(p, true); });
};

/* ── sidebar collapse — persisted, Ctrl/Cmd-B toggles (except while a
   terminal pane has focus: Ctrl-B is the tmux prefix). ── */
const sideEl = $("side");
if (localStorage.getItem("oasweb.side") === "closed") sideEl.classList.add("collapsed");
function toggleSide() {
  sideEl.classList.toggle("collapsed");
  localStorage.setItem("oasweb.side", sideEl.classList.contains("collapsed") ? "closed" : "open");
}
$("sidebtn").onclick = toggleSide;
window.addEventListener("keydown", (e) => {
  if (e.key === "b" && (e.ctrlKey || e.metaKey) && !e.altKey && !e.shiftKey) {
    if (document.activeElement && document.activeElement.classList.contains("term")) return;
    e.preventDefault(); toggleSide();
  }
});

/* ── grouping: workspace → repo → instances (children indented under parents) ── */
function groupInstances(list) {
  const workspaces = new Map();
  for (const i of list) {
    const wsName = (i.workspace || "?").split("/").pop();
    if (!workspaces.has(wsName)) workspaces.set(wsName, new Map());
    const repos = workspaces.get(wsName);
    const rName = i.repoName || "?";
    if (!repos.has(rName)) repos.set(rName, []);
    repos.get(rName).push(i);
  }
  // Order instances inside a repo: roots first (running first), children after their parent.
  for (const repos of workspaces.values()) {
    for (const [rName, items] of repos) {
      const byName = new Map(items.map(i => [i.instance, i]));
      const roots = items.filter(i => !i.parentInstance || !byName.has(i.parentInstance));
      const kids = (p) => items.filter(i => i.parentInstance === p.instance);
      const rank = (a, b) => (a.running === b.running ? a.instance.localeCompare(b.instance) : a.running ? -1 : 1);
      roots.sort(rank);
      const ordered = [];
      const walk = (i, depth) => { ordered.push({ ...i, depth }); kids(i).sort(rank).forEach(k => walk(k, depth + 1)); };
      roots.forEach(r => walk(r, 0));
      for (const i of items) if (!ordered.some(o => o.instance === i.instance)) ordered.push({ ...i, depth: 0 });
      repos.set(rName, ordered);
    }
  }
  return workspaces;
}

function matches(i) {
  if (!filterText) return true;
  const t = filterText.toLowerCase();
  return [i.instance, i.agent, i.repoName, i.task, i.branch].some(v => String(v || "").toLowerCase().includes(t));
}

/* ── available agents (souls): spawn from the browser — default is NO TASK,
   the instance comes up awaiting instruction through this panel. ── */
function soulMatches(a) {
  if (!filterText) return true;
  const t = filterText.toLowerCase();
  return [a.name, a.description, a.repoName].some(v => String(v || "").toLowerCase().includes(t));
}
async function spawnSoul(a, btn) {
  let task = "";
  if (btn.dataset.withTask) {
    task = prompt(`Task for the new ${a.name} instance (leave empty to spawn awaiting instructions):`) ?? null;
    if (task === null) return;
  }
  btn.disabled = true; btn.textContent = "spawning…";
  try {
    const r = await fetch("/api/spawn", { method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ agent: a.name, agentsRoot: a.agentsRoot, task }) });
    const d = await r.json();
    if (!r.ok || d.error) { alert(`Spawn failed: ${d.error || r.status}`); return; }
    await refreshPanel();
    setPaneSession(focusedPane() || makePane(), d.instance);
  } catch (e) { alert(`Spawn failed: ${e}`); }
  finally { btn.disabled = false; btn.textContent = btn.dataset.withTask ? "spawn +task" : "spawn"; }
}
function renderSouls(el) {
  const list = souls.agents.filter(soulMatches);
  if (!list.length) return;
  const g = document.createElement("div");
  const gid = "souls";
  g.className = "group" + (closedGroups.has(gid) ? " closed" : "");
  const h = document.createElement("div");
  h.className = "ghead";
  h.innerHTML = `<span class="tri">▾</span> Available agents <span class="count">${list.length}</span>`;
  h.onclick = () => { g.classList.toggle("closed"); g.classList.contains("closed") ? closedGroups.add(gid) : closedGroups.delete(gid);
                      localStorage.setItem("oasweb.closed", JSON.stringify([...closedGroups])); };
  g.appendChild(h);
  const box = document.createElement("div"); box.className = "glist";
  for (const a of list) {
    const d = document.createElement("div");
    d.className = "soul";
    // attached-mode agents need an owner's work tree — not spawnable standalone
    const attached = a.work === "attached";
    d.innerHTML = `
      <div class="iname">${escapeHtml(a.name)}
        <button class="spawnbtn" ${attached ? 'disabled title="Attached-mode agent — needs an owning instance\u2019s work tree; spawn from that instance"' : 'title="Spawn an instance with no task — it awaits your instructions"'}>spawn</button>
        <button class="spawnbtn" data-with-task="1" ${attached ? "disabled" : ""} title="Spawn with a task" style="margin-left:0">+task</button>
      </div>
      ${a.description ? `<div class="sdesc">${escapeHtml(a.description)}</div>` : ""}
      <div class="imeta">
        <span class="chip rt">${escapeHtml(a.runtime)}</span>
        <span class="chip">${escapeHtml(a.work)}</span>
        ${a.repo ? `<span class="chip">${escapeHtml(a.repoName)}</span>` : ""}
        ${a.kind === "tmp" ? '<span class="chip">local</span>' : ""}
      </div>`;
    const btns = d.querySelectorAll(".spawnbtn");
    btns[0].onclick = (e) => { e.stopPropagation(); spawnSoul(a, btns[0]); };
    btns[1].onclick = (e) => { e.stopPropagation(); spawnSoul(a, btns[1]); };
    box.appendChild(d);
  }
  g.appendChild(box);
  el.appendChild(g);
}

function renderRoster() {
  const el = $("groups"); el.innerHTML = "";
  const visible = panel.instances.filter(matches);
  if (!panel.instances.length) {
    el.innerHTML = '<div class="empty"><span class="big">◎</span>No instances yet.<br>Spawn one below or with <code>oas spawn &lt;agent&gt;</code>.</div>';
    renderSouls(el);
    return;
  }
  if (!visible.length) { el.innerHTML = '<div class="empty">Nothing matches the filter.</div>'; renderSouls(el); return; }
  const workspaces = groupInstances(visible);
  const multiWs = workspaces.size > 1;
  for (const [wsName, repos] of workspaces) {
    const g = document.createElement("div");
    const gid = "ws:" + wsName;
    g.className = "group" + (closedGroups.has(gid) ? " closed" : "");
    const total = [...repos.values()].reduce((n, v) => n + v.length, 0);
    const runningN = [...repos.values()].flat().filter(i => i.running).length;
    if (multiWs || true) {
      const h = document.createElement("div");
      h.className = "ghead";
      h.innerHTML = `<span class="tri">▾</span> ${wsName} <span class="count">${runningN}/${total} running</span>`;
