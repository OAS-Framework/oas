<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>oas — agents</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  /* ── Semantic design tokens. Dark and light palettes both hold WCAG AA
     (≥4.5:1) for body text; muted text stays ≥4.5:1 against panel surfaces. ── */
  :root, [data-theme="dark"] {
    --bg: #0e1116;          /* app background */
    --surface: #161b22;     /* cards, sidebar */
    --surface-2: #1c2129;   /* hover / raised */
    --border: #2d333c;
    --fg: #e6edf3;          /* primary text  (13.9:1 on bg) */
    --muted: #9aa4b2;       /* secondary text (5.6:1 on surface) */
    --faint: #6e7681;       /* tertiary/disabled */
    --accent: #4493f8;      /* interactive */
    --accent-fg: #ffffff;
    --ok: #3fb950; --warn: #d29922; --danger: #f85149;
    --chip-bg: #21262e; --chip-fg: #adb6c2;
    --sel: #1f6feb26;       /* selected wash */
    --term-bg: #0a0d12;     /* session surface follows the theme */
    --term-fg: #e6edf3;
    --term-sel: #264f78;
    --shadow: 0 1px 3px rgb(0 0 0 / .4);
  }
  [data-theme="light"] {
    /* Slightly solarised light — warm paper surfaces (Solarized base3/base2
       tints), ink and accents kept AA-readable on them. */
    --bg: #f3eddd;
    --surface: #fdf6e3;
    --surface-2: #f0e9d2;
    --border: #ddd4bc;
    --fg: #37424a;          /* 9.9:1 on surface */
    --muted: #657b83;       /* solarized base00 — 4.9:1 */
    --faint: #93a1a1;       /* solarized base1 */
    --accent: #1f6fb2;
    --accent-fg: #ffffff;
    --ok: #667f00; --warn: #9a6a00; --danger: #c73f3f;
    --chip-bg: #ede5cc; --chip-fg: #62707a;
    --sel: #1f6fb21f;
    --term-bg: #fdf6e3;     /* solarized-light session surface */
    --term-fg: #586e75;
    --term-sel: #d3c9a8;
    --shadow: 0 1px 3px rgb(88 110 117 / .14);
  }

  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--fg); height: 100vh; display: flex; flex-direction: column;
         font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         -webkit-font-smoothing: antialiased; }

  /* ── Header ── */
  header { padding: 0 20px; height: 52px; border-bottom: 1px solid var(--border); display: flex; align-items: center;
           gap: 14px; background: var(--surface); flex: none; }
  header h1 { font-size: 14px; margin: 0; font-weight: 650; letter-spacing: .01em; }
  header h1 .logo { color: var(--accent); }
  .hmeta { color: var(--muted); font-size: 12px; }
  .spacer { flex: 1; }
  .iconbtn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 8px;
             width: 32px; height: 32px; cursor: pointer; font-size: 15px; line-height: 1; }
  .iconbtn:hover { color: var(--fg); border-color: var(--faint); }
  #wssel { background: var(--surface-2); color: var(--fg); border: 1px solid var(--border); border-radius: 8px;
           padding: 5px 10px; font: 12.5px inherit; font-weight: 600; cursor: pointer; outline: none; }
  #wssel:hover, #wssel:focus { border-color: var(--accent); }

  main { flex: 1; display: flex; min-height: 0; }

  /* ── Sidebar / roster ── */
  #side { width: 340px; min-width: 280px; max-width: 420px; border-right: 1px solid var(--border);
          background: var(--surface); display: flex; flex-direction: column; }
  #filterbar { padding: 12px 12px 8px; display: flex; gap: 8px; }
  #filter { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--fg);
            border-radius: 8px; padding: 7px 11px; font-size: 13px; outline: none; }
  #filter:focus { border-color: var(--accent); }
  #filter::placeholder { color: var(--faint); }
  #groups { flex: 1; overflow-y: auto; padding: 0 8px 12px; }

  .group { margin-top: 10px; }
  .ghead { display: flex; align-items: center; gap: 8px; padding: 4px 8px; cursor: pointer; user-select: none;
           color: var(--muted); font-size: 11px; font-weight: 650; text-transform: uppercase; letter-spacing: .06em; }
  .ghead:hover { color: var(--fg); }
  .ghead .tri { transition: transform .12s; font-size: 9px; }
  .group.closed .tri { transform: rotate(-90deg); }
  .ghead .count { margin-left: auto; font-weight: 500; color: var(--faint); text-transform: none; letter-spacing: 0; }
  .group.closed .glist { display: none; }

  .repo { margin: 2px 0 2px 6px; }
  .rhead { color: var(--faint); font-size: 11.5px; padding: 5px 8px 2px; font-weight: 600; }

  .inst { padding: 8px 10px 8px 12px; border-radius: 8px; cursor: pointer; margin: 1px 0;
          border: 1px solid transparent; position: relative; }
  .inst:hover { background: var(--surface-2); }
  .inst.sel { background: var(--sel); border-color: var(--accent); }
  .inst.idle { opacity: .62; }
  .inst.child { margin-left: 18px; }
  .inst.child::before { content: ""; position: absolute; left: -10px; top: 0; bottom: 50%; width: 9px;
                        border-left: 1px solid var(--border); border-bottom: 1px solid var(--border);
                        border-bottom-left-radius: 6px; }
  .iname { font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 7px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--faint); flex: none; }
  .dot.on { background: var(--ok); box-shadow: 0 0 0 3px color-mix(in srgb, var(--ok) 22%, transparent); }
  .itask { color: var(--muted); font-size: 12px; margin-top: 3px; overflow: hidden; text-overflow: ellipsis;
           white-space: nowrap; }
  .imeta { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; align-items: center; }
  .chip { background: var(--chip-bg); color: var(--chip-fg); border-radius: 999px; font-size: 10.5px;
          padding: 1px 8px; font-weight: 550; }
  .chip.dirty { color: var(--warn); }
  .chip.rt { color: var(--accent); }

  /* ── Main view ── */
  #view { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); }
  #vhead { padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--surface); display: none; }
  #vhead .row1 { display: flex; align-items: center; gap: 10px; }
  #vhead .title { font-weight: 650; font-size: 15px; }
  #vhead .badge { font-size: 11px; padding: 2px 9px; border-radius: 999px; font-weight: 600; }
  .badge.on { background: color-mix(in srgb, var(--ok) 16%, transparent); color: var(--ok); }
  .badge.off { background: var(--chip-bg); color: var(--muted); }
  #vhead .row2 { color: var(--muted); font-size: 12.5px; margin-top: 4px; display: flex; gap: 16px; flex-wrap: wrap; }
  #vhead .row2 b { color: var(--fg); font-weight: 550; }
  #vhead .actions { margin-left: auto; display: flex; gap: 8px; }
  button.act { background: var(--surface); color: var(--fg); border: 1px solid var(--border); border-radius: 8px;
               padding: 6px 13px; cursor: pointer; font-size: 12.5px; font-weight: 550; }
  button.act:hover { border-color: var(--accent); color: var(--accent); }
  button.act.danger:hover { border-color: var(--danger); color: var(--danger); }

  /* ── Terminal view — a faithful mirror of the tmux pane: the raw ANSI
     capture rendered as a monospace grid (scrollback + live screen), with
     the real cursor. No transcript reconstruction — what tmux shows is
     what you see. ── */
  #term { flex: 1; overflow: auto; padding: 14px 18px; outline: none; position: relative;
          background: var(--term-bg); color: var(--term-fg);
          font: 12.5px/1.35 "SF Mono", ui-monospace, SFMono-Regular, Menlo, monospace; }
  #term.focused { box-shadow: inset 0 0 0 2px color-mix(in srgb, var(--accent) 55%, transparent); }
  #tgrid { white-space: pre; width: max-content; min-width: 100%; }
  #tgrid .trow { min-height: 1.35em; }
  #tgrid .cur { background: var(--term-fg); color: var(--term-bg); }
  #term .scrollmark { border-bottom: 1px dashed color-mix(in srgb, var(--term-fg) 25%, transparent);
                      margin: 4px 0 6px; }
  #keyhint { position: sticky; bottom: 0; float: right; margin: 0 0 0 auto; pointer-events: none;
             font: 10.5px -apple-system, sans-serif; color: var(--term-bg);
             background: color-mix(in srgb, var(--accent) 85%, var(--term-fg));
             border-radius: 6px; padding: 2px 9px; opacity: 0; transition: opacity .15s; }
  #term.focused #keyhint { opacity: .92; }

  /* ── Loading states ── */
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100% { opacity: .35; } 50% { opacity: 1; } }
  .spinner { width: 14px; height: 14px; border: 2px solid color-mix(in srgb, var(--term-fg) 25%, transparent);
             border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite;
             display: inline-block; vertical-align: -2px; }
  .loading-block { display: flex; align-items: center; gap: 10px; justify-content: center;
                   padding: 48px 0; color: color-mix(in srgb, var(--term-fg) 60%, transparent);
                   font: 13px -apple-system, sans-serif; }

  #composer { border-top: 1px solid var(--border); background: var(--surface); padding: 12px 18px;
              display: none; gap: 10px; align-items: flex-end; }
  #msgwrap { flex: 1; position: relative; }
  #msg { width: 100%; background: var(--bg); color: var(--fg); border: 1px solid var(--border);
         border-radius: 18px; padding: 11px 46px 11px 16px;
         font: 13.5px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         outline: none; resize: none; overflow-y: auto;
         min-height: 44px; max-height: 176px; box-sizing: border-box; display: block;
         transition: max-height .18s ease, min-height .18s ease; }
  #msg:focus { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent); }
  #msg::placeholder { color: var(--faint); }
  /* Ctrl-E expanded editor — a taller, calmer writing surface (not fullscreen) */
  #composer.expanded #msg { min-height: 220px; max-height: 46vh; border-radius: 12px;
         font: 13px/1.55 "SF Mono", ui-monospace, SFMono-Regular, Menlo, monospace; }
  #msghint { position: absolute; right: 14px; bottom: 7px; font-size: 10px; color: var(--faint);
             pointer-events: none; user-select: none; }
  #composer.expanded #msghint { display: none; }
  #expandbtn { position: absolute; right: 10px; top: 8px; background: none; border: none; cursor: pointer;
               color: var(--faint); font-size: 13px; padding: 2px 4px; border-radius: 5px; }
  #expandbtn:hover { color: var(--fg); background: var(--surface-2); }
  #sendbtn { background: var(--accent); color: var(--accent-fg); border: none; border-radius: 50%;
             width: 40px; height: 40px; cursor: pointer; font-size: 16px; font-weight: 600; flex: none;
             display: inline-flex; align-items: center; justify-content: center; margin-bottom: 2px; }
  #sendbtn:hover { filter: brightness(1.1); }

  .empty { color: var(--muted); text-align: center; padding: 60px 30px; font-size: 13.5px;
           font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; white-space: normal; }
  .empty .big { font-size: 32px; display: block; margin-bottom: 12px; opacity: .5; }
  .empty code { background: var(--chip-bg); border-radius: 6px; padding: 1px 7px; font-size: 12px; }

  /* ANSI 16-color palette — fg (.aN) and bg (.bN) classes. Dark-surface set,
     with a solarized remap for the light theme so base colors stay readable. */
  .a30{color:#768390}.a31{color:#ff7b72}.a32{color:#4ac26b}.a33{color:#d9a032}.a34{color:#6cb2ff}.a35{color:#c297ff}.a36{color:#4ed1db}.a37{color:#c3ccd6}
  .a90{color:#8b949e}.a91{color:#ffa198}.a92{color:#63e084}.a93{color:#edbb4a}.a94{color:#8cc5ff}.a95{color:#d5b3ff}.a96{color:#70e0e8}.a97{color:#f5f9ff}
  .b30{background:#768390}.b31{background:#ff7b72}.b32{background:#4ac26b}.b33{background:#d9a032}.b34{background:#6cb2ff}.b35{background:#c297ff}.b36{background:#4ed1db}.b37{background:#c3ccd6}
  .b90{background:#8b949e}.b91{background:#ffa198}.b92{background:#63e084}.b93{background:#edbb4a}.b94{background:#8cc5ff}.b95{background:#d5b3ff}.b96{background:#70e0e8}.b97{background:#f5f9ff}
  [data-theme="light"] .a30{color:#93a1a1}[data-theme="light"] .a31{color:#dc322f}[data-theme="light"] .a32{color:#859900}[data-theme="light"] .a33{color:#b58900}
  [data-theme="light"] .a34{color:#268bd2}[data-theme="light"] .a35{color:#d33682}[data-theme="light"] .a36{color:#2aa198}[data-theme="light"] .a37{color:#586e75}
  [data-theme="light"] .a90{color:#839496}[data-theme="light"] .a91{color:#cb4b16}[data-theme="light"] .a92{color:#6b7f00}[data-theme="light"] .a93{color:#8f6c00}
  [data-theme="light"] .a94{color:#1f6fb2}[data-theme="light"] .a95{color:#b02e6d}[data-theme="light"] .a96{color:#1f8a82}[data-theme="light"] .a97{color:#37424a}
  [data-theme="light"] .b30{background:#93a1a1}[data-theme="light"] .b31{background:#dc322f}[data-theme="light"] .b32{background:#859900}[data-theme="light"] .b33{background:#b58900}
  [data-theme="light"] .b34{background:#268bd2}[data-theme="light"] .b35{background:#d33682}[data-theme="light"] .b36{background:#2aa198}[data-theme="light"] .b37{background:#586e75}
  [data-theme="light"] .b90{background:#839496}[data-theme="light"] .b91{background:#cb4b16}[data-theme="light"] .b92{background:#6b7f00}[data-theme="light"] .b93{background:#8f6c00}
  [data-theme="light"] .b94{background:#1f6fb2}[data-theme="light"] .b95{background:#b02e6d}[data-theme="light"] .b96{background:#1f8a82}[data-theme="light"] .b97{background:#37424a}
  /* reverse-video with default colors: swap the terminal fg/bg tokens */
  .fdef{color:var(--term-bg)}.bdef{background:var(--term-fg)}
  .ab{font-weight:700}.ad{opacity:.65}.ai{font-style:italic}.au{text-decoration:underline}
</style>
</head>
<body>
<header>
  <h1><span class="logo">●</span> oas agents</h1>
  <select id="wssel" style="display:none"></select>
  <span class="hmeta" id="teamline"></span>
  <span class="spacer"></span>
  <span class="hmeta" id="stamp"></span>
  <button class="iconbtn" id="themebtn" title="Toggle light/dark">◐</button>
</header>
<main>
  <div id="side">
    <div id="filterbar"><input id="filter" placeholder="Filter agents, repos, tasks…" autocomplete="off"></div>
    <div id="groups"></div>
  </div>
  <div id="view">
    <div id="vhead">
      <div class="row1">
        <span class="title" id="vtitle"></span>
        <span class="badge" id="vbadge"></span>
        <span class="actions">
          <button class="act danger" id="intbtn" title="Send Ctrl-C to the session">Interrupt</button>
        </span>
      </div>
      <div class="row2" id="vinfo"></div>
    </div>
    <div id="term" tabindex="0"><div class="empty"><span class="big">⌥</span>Select an instance to sit at its terminal.<br>Click the terminal to type directly into the agent's session.</div></div>
    <div id="composer">
      <div id="msgwrap">
        <textarea id="msg" rows="1" placeholder="Message the agent — Enter sends, Shift+Enter new line, Ctrl+E expand" autocomplete="off"></textarea>
        <button id="expandbtn" title="Expand editor (Ctrl+E)">⤢</button>
        <span id="msghint">⇧↵ newline · ^E expand</span>
      </div>
      <button id="sendbtn" title="Send">↑</button>
    </div>
  </div>
</main>
<script>
const $ = (id) => document.getElementById(id);
let panel = { instances: [] };
let sel = null;
let filterText = "";
const closedGroups = new Set(JSON.parse(localStorage.getItem("oasweb.closed") || "[]"));

/* ── theme ── */
const savedTheme = localStorage.getItem("oasweb.theme");
const sysDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
document.documentElement.dataset.theme = savedTheme || (sysDark ? "dark" : "light");
$("themebtn").onclick = () => {
  const next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
  document.documentElement.dataset.theme = next;
  localStorage.setItem("oasweb.theme", next);
};

/* ── grouping: workspace → repo → instances (children indented under parents) ── */
function groupInstances(list) {
  const workspaces = new Map();
  for (const i of list) {
    const wsName = (i.workspace || "?").split("/").pop();
    if (!workspaces.has(wsName)) workspaces.set(wsName, new Map());
    const repos = workspaces.get(wsName);
    const rName = i.repoName || "?";
    if (!repos.has(rName)) repos.set(rName, []);
    repos.get(rName).push(i);
  }
  // Order instances inside a repo: roots first (running first), children after their parent.
  for (const repos of workspaces.values()) {
    for (const [rName, items] of repos) {
      const byName = new Map(items.map(i => [i.instance, i]));
      const roots = items.filter(i => !i.parentInstance || !byName.has(i.parentInstance));
      const kids = (p) => items.filter(i => i.parentInstance === p.instance);
      const rank = (a, b) => (a.running === b.running ? a.instance.localeCompare(b.instance) : a.running ? -1 : 1);
      roots.sort(rank);
      const ordered = [];
      const walk = (i, depth) => { ordered.push({ ...i, depth }); kids(i).sort(rank).forEach(k => walk(k, depth + 1)); };
      roots.forEach(r => walk(r, 0));
      for (const i of items) if (!ordered.some(o => o.instance === i.instance)) ordered.push({ ...i, depth: 0 });
      repos.set(rName, ordered);
    }
  }
  return workspaces;
}

function matches(i) {
  if (!filterText) return true;
  const t = filterText.toLowerCase();
  return [i.instance, i.agent, i.repoName, i.task, i.branch].some(v => String(v || "").toLowerCase().includes(t));
}

function renderRoster() {
  const el = $("groups"); el.innerHTML = "";
  const visible = panel.instances.filter(matches);
  if (!panel.instances.length) {
    el.innerHTML = '<div class="empty"><span class="big">◎</span>No instances yet.<br>Spawn one with <code>oas spawn &lt;agent&gt;</code>.</div>';
    return;
  }
  if (!visible.length) { el.innerHTML = '<div class="empty">Nothing matches the filter.</div>'; return; }
  const workspaces = groupInstances(visible);
  const multiWs = workspaces.size > 1;
  for (const [wsName, repos] of workspaces) {
    const g = document.createElement("div");
    const gid = "ws:" + wsName;
    g.className = "group" + (closedGroups.has(gid) ? " closed" : "");
    const total = [...repos.values()].reduce((n, v) => n + v.length, 0);
    const runningN = [...repos.values()].flat().filter(i => i.running).length;
    if (multiWs || true) {
      const h = document.createElement("div");
      h.className = "ghead";
      h.innerHTML = `<span class="tri">▾</span> ${wsName} <span class="count">${runningN}/${total} running</span>`;
      h.onclick = () => { g.classList.toggle("closed"); g.classList.contains("closed") ? closedGroups.add(gid) : closedGroups.delete(gid);
                          localStorage.setItem("oasweb.closed", JSON.stringify([...closedGroups])); };
      g.appendChild(h);
    }
    const list = document.createElement("div"); list.className = "glist";
    const multiRepo = repos.size > 1;
    for (const [rName, items] of repos) {
      const rbox = document.createElement("div"); rbox.className = "repo";
      if (multiRepo) { const rh = document.createElement("div"); rh.className = "rhead"; rh.textContent = rName; rbox.appendChild(rh); }
      for (const i of items) {
        const d = document.createElement("div");
        d.className = "inst" + (sel === i.instance ? " sel" : "") + (i.running ? "" : " idle") + (i.depth ? " child" : "");
        d.innerHTML = `
          <div class="iname"><span class="dot ${i.running ? "on" : ""}"></span>${i.instance}</div>
          <div class="itask">${(i.task || "").slice(0, 100)}</div>
          <div class="imeta">
            <span class="chip rt">${i.runtime}</span>
            <span class="chip">${i.work}${i.branch ? " · " + i.branch : ""}</span>
            ${i.git && i.git.dirty ? `<span class="chip dirty">±${i.git.dirty}</span>` : ""}
          </div>`;
        d.onclick = () => select(i.instance);
        rbox.appendChild(d);
      }
      list.appendChild(rbox);
    }
    g.appendChild(list);
    el.appendChild(g);
  }
}

let currentWs = localStorage.getItem("oasweb.ws") || "";
async function refreshPanel() {
  const r = await fetch(`/api/panel${currentWs ? `?ws=${encodeURIComponent(currentWs)}` : ""}`);
  panel = await r.json();
  if (panel.workspace) currentWs = panel.workspace.id;
  // workspace switcher — shown when the server watches more than one
  const sel2 = $("wssel");
  if ((panel.workspaces || []).length > 1) {
    sel2.style.display = "";
    const options = panel.workspaces.map(w => `<option value="${w.id}" ${w.id === currentWs ? "selected" : ""}>${w.name}${w.team ? ` · ${w.team.name}` : ""}</option>`).join("");
    if (sel2.innerHTML !== options) sel2.innerHTML = options;
    sel2.value = currentWs;
  } else sel2.style.display = "none";
  $("teamline").textContent = panel.team ? `team ${panel.team.name}` : "";
  $("stamp").textContent = `${panel.running} running · ${panel.instances.length} total`;
  renderRoster();
}
$("wssel").addEventListener("change", (e) => {
  currentWs = e.target.value;
  localStorage.setItem("oasweb.ws", currentWs);
  sel = null; lastTermSig = "";
  $("vhead").style.display = "none"; $("composer").style.display = "none";
  $("term").innerHTML = '<div class="empty"><span class="big">⌥</span>Select an instance to sit at its terminal.</div>';
  refreshPanel();
});

/* ══════════════════════════════════════════════════════════════════════════
   Terminal renderer — hand-rolled ANSI/SGR → HTML. The server ships the raw
   tmux capture (capture-pane -p -e): plain lines with SGR runs. We parse
   SGR only; every other escape sequence is stripped. Each capture line is one
   grid row (no rewrap — tmux already wrapped at the pane width), so what the
   pane shows is exactly what renders.
   ══════════════════════════════════════════════════════════════════════════ */
function escapeHtml(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

/* xterm 256-color palette entries 16-255 (0-15 map to the themed classes). */
/* ── ANSI renderer (pure — kept DOM-free between the RENDERER markers so the
   test suite can extract and exercise it in node) ── */
/* OASWEB_RENDERER_BEGIN */
function color256(n) {
  if (n < 16) return null; // caller uses classes for the base 16
  if (n < 232) {
    const c = n - 16, v = (x) => (x ? x * 40 + 55 : 0);
    return `rgb(${v(Math.floor(c / 36))},${v(Math.floor(c / 6) % 6)},${v(c % 6)})`;
  }
  const g = (n - 232) * 10 + 8;
  return `rgb(${g},${g},${g})`;
}

function freshAttr() {
  return { fg: null, bg: null, bold: false, dim: false, italic: false, underline: false, reverse: false };
}
/* fg/bg are null (default) | { cls: n } (base-16, theme-adaptive) | { css: 'rgb(...)' } */
function applySgr(attr, params) {
  const p = params.length ? params : [0];
  for (let i = 0; i < p.length; i++) {
    const n = p[i];
    if (n === 0) Object.assign(attr, freshAttr());
    else if (n === 1) attr.bold = true;
    else if (n === 2) attr.dim = true;
    else if (n === 3) attr.italic = true;
    else if (n === 4) attr.underline = true;
    else if (n === 7) attr.reverse = true;
    else if (n === 22) { attr.bold = false; attr.dim = false; }
    else if (n === 23) attr.italic = false;
    else if (n === 24) attr.underline = false;
    else if (n === 27) attr.reverse = false;
    else if (n >= 30 && n <= 37) attr.fg = { cls: n };
    else if (n === 39) attr.fg = null;
    else if (n >= 40 && n <= 47) attr.bg = { cls: n - 10 };
    else if (n === 49) attr.bg = null;
    else if (n >= 90 && n <= 97) attr.fg = { cls: n };
    else if (n >= 100 && n <= 107) attr.bg = { cls: n - 10 };
    else if (n === 38 || n === 48) {
      const isFg = n === 38;
      if (p[i + 1] === 5) {
        const c = p[i + 2] | 0; i += 2;
        const tok = c < 8 ? { cls: 30 + c } : c < 16 ? { cls: 90 + c - 8 } : { css: color256(c) };
        if (isFg) attr.fg = tok; else attr.bg = tok;
      } else if (p[i + 1] === 2) {
        const [r, g, b] = [p[i + 2] | 0, p[i + 3] | 0, p[i + 4] | 0]; i += 4;
        const tok = { css: `rgb(${r},${g},${b})` };

function spanFor(text, attr) {

  const cls = [], style = [];
  if (fg === "def") cls.push("fdef");
  else if (fg) { if (fg.cls != null) cls.push("a" + fg.cls); else style.push("color:" + fg.css); }
  if (bg === "def") cls.push("bdef");
  else if (bg) { if (bg.cls != null) cls.push("b" + bg.cls); else style.push("background:" + bg.css); }
  if (attr.bold) cls.push("ab");
  if (attr.dim) cls.push("ad");
  if (attr.italic) cls.push("ai");
  if (attr.underline) cls.push("au");
  const esc = escapeHtml(text);
  if (!cls.length && !style.length) return esc;
  return `<span${cls.length ? ` class="${cls.join(" ")}"` : ""}${style.length ? ` style="${style.join(";")}"` : ""}>${esc}</span>`;

/* One capture line → { html, cells } where cells is the char list (for cursor
   placement). SGR state carries across lines, as tmux emits it. */
const ANSI_RE = /\x1b\[([0-9;:]*)m|\x1b\][^\x07\x1b]*(?:\x07|\x1b\\)|\x1b\[[0-9;?]*[A-Za-ln-z]|\x1b[^[\]]/g;
/* Terminal cell width, tmux-compatible, computed per displayed grapheme
   cluster (Intl.Segmenter): Unicode marks and ZW chars occupy 0 columns; a
   cluster with VS16/keycap/ZWJ (emoji presentation) or a regional-indicator
   pair occupies 2; East Asian wide/fullwidth base chars occupy 2; else 1.
   tmux's cursor_x counts cells, not JS chars. */
const MARK_RE = /\p{M}/u;
function cellWidth(cp) {
  if (cp === 0x200b || cp === 0x200c || cp === 0x200d || cp === 0xfeff) return 0;
  if (MARK_RE.test(String.fromCodePoint(cp))) return 0;
  if ((cp >= 0x1100 && cp <= 0x115f) || (cp >= 0x2e80 && cp <= 0x303e) ||
      (cp >= 0x3041 && cp <= 0x33ff) || (cp >= 0x3400 && cp <= 0x4dbf) ||
      (cp >= 0x4e00 && cp <= 0x9fff) || (cp >= 0xa000 && cp <= 0xa4cf) ||
      (cp >= 0xac00 && cp <= 0xd7a3) || (cp >= 0xf900 && cp <= 0xfaff) ||
      (cp >= 0xfe30 && cp <= 0xfe4f) || (cp >= 0xff00 && cp <= 0xff60) ||
      (cp >= 0xffe0 && cp <= 0xffe6) || (cp >= 0x1f300 && cp <= 0x1faff) ||
      (cp >= 0x20000 && cp <= 0x3fffd)) return 2;
  return 1;
}
function clusterWidth(cluster) {
  // Emoji presentation: VS16, keycap, ZWJ sequences, regional-indicator pairs
  if (/\u{FE0F}|\u{20E3}|\u{200D}/u.test(cluster)) return 2;
  const first = cluster.codePointAt(0);
  if (first >= 0x1f1e6 && first <= 0x1f1ff) return 2; // flags
  // Base char width; trailing marks in the cluster add nothing.
  for (const ch of cluster) {
    const w = cellWidth(ch.codePointAt(0));
    if (w > 0) return w;
  }
  return 0; // pure marks/ZW cluster
}
const SEG = typeof Intl !== "undefined" && Intl.Segmenter ? new Intl.Segmenter(undefined, { granularity: "grapheme" }) : null;
function graphemes(text) {
  return SEG ? [...SEG.segment(text)].map((s) => s.segment) : [...text];
}
function renderLine(line, attr, cursorCol) {
  let html = "", col = 0, last = 0;
  ANSI_RE.lastIndex = 0;
  const emit = (text) => {
    if (!text) return;
    // Walk grapheme clusters counting terminal cells so the cursor lands on
    // the right glyph even with CJK/emoji (2 cells), combining marks (0), or
    // ZWJ emoji sequences (one 2-cell cluster).
    if (cursorCol == null) { html += spanFor(text, attr); for (const g of graphemes(text)) col += clusterWidth(g); return; }
    let before = "", at = "", after = "";
    for (const g of graphemes(text)) {
      const w = clusterWidth(g);
      if (at) after += g;
      else if (col + Math.max(w, 1) <= cursorCol || (w === 0 && col <= cursorCol)) before += g;
      else at = g;
      col += w;
    }
    if (at) {
      html += spanFor(before, attr);
      html += `<span class="cur">${escapeHtml(at)}</span>`;
      html += spanFor(after, attr);
      cursorCol = null; // consumed
    } else html += spanFor(text, attr);
  };
  let m;
  while ((m = ANSI_RE.exec(line))) {
    emit(line.slice(last, m.index));
    last = ANSI_RE.lastIndex;
    if (m[0].endsWith("m") && m[0].startsWith("\x1b[") && m[1] !== undefined) {
      applySgr(attr, m[1] === "" ? [0] : m[1].split(/[;:]/).map(Number));
    } // other sequences: stripped
  }
  emit(line.slice(last));
  if (cursorCol != null && col <= cursorCol) { // cursor past end of text: pad
    html += escapeHtml(" ".repeat(cursorCol - col)) + '<span class="cur"> </span>';
  }

}
function renderCapture(d) {
  let lines = d.text.replace(/\n$/, "").split("\n");
  const rows = d.size?.rows || 24;
  // The visible screen starts after the history lines the server reported —
  // tmux trims trailing blank screen lines from the capture, so counting rows
  // from the end would misplace the cursor on a non-full screen.
  const screenStart = typeof d.history === "number"
    ? Math.min(d.history, lines.length)
    : Math.max(0, lines.length - rows);
  const attr = freshAttr();
  const out = [];
  for (let i = 0; i < lines.length; i++) {
    const isScreen = i >= screenStart;
    const cursorCol = (d.size?.cursor && isScreen && (i - screenStart) === d.size.cy) ? d.size.cx : null;
    out.push(`<div class="trow">${renderLine(lines[i], attr, cursorCol) || "&nbsp;"}</div>`);
    if (i === screenStart - 1) out.push('<div class="scrollmark"></div>');
  }
  return out.join("");
}
/* OASWEB_RENDERER_END */
let lastTermSig = "";
let termReq = 0;
let fastPollUntil = 0;
async function refreshTerm(force) {
  if (!sel || document.hidden) return;
  const forSel = sel;
  const myReq = ++termReq;
  let d;
  try { const r = await fetch(`/api/session/${encodeURIComponent(forSel)}?lines=2000`); d = await r.json(); }
  catch { return; } // keep last good render on transient errors
  if (myReq !== termReq || forSel !== sel) return; // stale response — never paint
  const box = $("term");
  if (!d.running) {
    const sig = forSel + ":idle";
    if (sig === lastTermSig && !force) return;
    lastTermSig = sig;
    box.innerHTML = '<div class="empty"><span class="big">◌</span>Session is not running.<br>Start it with <code>oas attach ' + escapeHtml(forSel) + '</code> or spawn anew.</div>';
    return;
  }
  const sig = forSel + ":" + d.text.length + ":" + d.text + ":" + JSON.stringify(d.size);
  if (sig === lastTermSig && !force) return;
  lastTermSig = sig;
  const nearBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 60;
  const hadFocus = box.classList.contains("focused");
  box.innerHTML = `<div id="tgrid">${renderCapture(d)}</div><div id="keyhint">keys go to the agent · click outside to release</div>`;
  if (force || nearBottom) box.scrollTop = box.scrollHeight;
  if (hadFocus) box.classList.add("focused");
}

function select(name) {
  sel = name;
  const i = panel.instances.find(x => x.instance === name);
  $("vhead").style.display = "block";
  $("composer").style.display = "flex";
  $("vtitle").textContent = name;
  $("vbadge").textContent = i.running ? "running" : "idle";
  $("vbadge").className = "badge " + (i.running ? "on" : "off");
  $("vinfo").innerHTML = [
    `soul <b>${i.agent}</b>`,
    `repo <b>${i.repoName}</b>${i.branch ? ` @ <b>${i.branch}</b>` : ""}`,
    `mode <b>${i.work}</b>`,
    `runtime <b>${i.runtime}</b>${i.model ? ` (${i.model})` : ""}`,
    i.next ? `next: ${i.next.slice(0, 110)}` : "",
  ].filter(Boolean).map(x => `<span>${x}</span>`).join("");
  renderRoster();
  lastTermSig = "";
  termReq++; // invalidate any in-flight fetch for the previous instance
  $("term").innerHTML = '<div class="loading-block"><span class="spinner"></span> Attaching to session…</div>';
  refreshTerm(true);
  $("msg").focus();
}

/* ── composer: message + Enter via /api/send (kept — the comfortable way to
   talk to the agent); the terminal itself takes raw keys when focused. ── */
async function sendMsg() {
  const input = $("msg"); const text = input.value;
  if (!sel || !text.trim()) return;
  input.value = "";
  $("composer").classList.remove("expanded");
  autosize();
  fastPollUntil = Date.now() + 15000; // tight polling right after a send
  await fetch(`/api/send/${sel}`, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ text }) });
  refreshTerm(true);
}
$("sendbtn").onclick = sendMsg;

const msgEl = $("msg");
function autosize() {
  msgEl.style.height = "auto";
  msgEl.style.height = Math.min(msgEl.scrollHeight, $("composer").classList.contains("expanded") ? window.innerHeight * .46 : 176) + "px";
}
function toggleExpand() {
  $("composer").classList.toggle("expanded");
  autosize(); msgEl.focus();
}
msgEl.addEventListener("input", autosize);
msgEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMsg(); return; }
  if (e.key === "e" && e.ctrlKey && !e.metaKey && !e.altKey) { e.preventDefault(); toggleExpand(); return; }
  if (e.key === "Escape" && $("composer").classList.contains("expanded")) { e.preventDefault(); toggleExpand(); }
});
$("expandbtn").onclick = toggleExpand;
$("intbtn").onclick = async () => { if (sel) { await fetch(`/api/interrupt/${sel}`, { method: "POST" }); setTimeout(() => refreshTerm(true), 350); } };
$("filter").addEventListener("input", (e) => { filterText = e.target.value; renderRoster(); });

/* ── direct keyboard passthrough: click the terminal, type into the agent.
   Keydown → bytes → POST /api/keys. Browser/Cmd shortcuts pass through. ── */
const termEl = $("term");
termEl.addEventListener("mousedown", () => { if (sel) setTimeout(() => termEl.focus(), 0); });
termEl.addEventListener("focus", () => termEl.classList.add("focused"));
termEl.addEventListener("blur", () => termEl.classList.remove("focused"));

let keyQueue = "";
let keyQueueFor = null; // instance the queued keys were typed at
let keyFlush = null;
function queueKeys(data) {
  if (keyQueueFor !== sel) { keyQueue = ""; keyQueueFor = sel; } // never leak keys across a switch
  keyQueue += data;
  if (keyFlush) return;
  keyFlush = setTimeout(async () => {
    const payload = keyQueue, forSel = keyQueueFor;
    keyQueue = ""; keyFlush = null;
    if (!forSel || forSel !== sel || !payload) return;
    fastPollUntil = Date.now() + 4000;
    try {
      await fetch(`/api/keys/${encodeURIComponent(forSel)}`, { method: "POST",
        headers: { "content-type": "application/json" }, body: JSON.stringify({ data: payload }) });
    } catch { /* transient */ }
    refreshTerm(false);
  }, 12); // coalesce fast typing into one request
}
function keyToBytes(e) {
  if (e.metaKey) return null;                 // Cmd-shortcuts stay in the browser
  const k = e.key;
  if (e.ctrlKey && !e.altKey) {
    if (k.length === 1) {
      const c = k.toLowerCase().charCodeAt(0);
      if (c >= 97 && c <= 122) return String.fromCharCode(c - 96); // Ctrl-A..Z
      if (k === "[") return "\x1b"; if (k === "]") return "\x1d";
      if (k === "\\") return "\x1c"; if (k === " ") return "\x00";
    }
    return null;
  }
  switch (k) {
    case "Enter": return "\r";
    case "Backspace": return "\x7f";
    case "Tab": return "\t";
    case "Escape": return "\x1b";
    case "ArrowUp": return "\x1b[A";
    case "ArrowDown": return "\x1b[B";
    case "ArrowRight": return "\x1b[C";
    case "ArrowLeft": return "\x1b[D";
    case "Home": return "\x1b[H";
    case "End": return "\x1b[F";
    case "PageUp": return "\x1b[5~";
    case "PageDown": return "\x1b[6~";
    case "Delete": return "\x1b[3~";
  }
  if (k.length === 1) return e.altKey ? "\x1b" + k : k; // printable (alt = ESC prefix)
  return null; // Shift, F-keys, media keys… let them be
}
termEl.addEventListener("keydown", (e) => {
  if (!sel || document.activeElement !== termEl) return;
  const bytes = keyToBytes(e);
  if (bytes == null) return; // let the browser handle it
  e.preventDefault();
  queueKeys(bytes);
});
termEl.addEventListener("paste", (e) => {
  if (!sel || document.activeElement !== termEl) return;
  const text = e.clipboardData?.getData("text");
  if (!text) return;
  e.preventDefault();
  // Pastes never ride the key path: the server routes { paste: true } through
  // tmux load-buffer/paste-buffer -p so multiline text is ONE bracketed paste,
  // not a series of carriage returns a shell would execute line by line.
  const forSel = sel;
  fastPollUntil = Date.now() + 4000;
  fetch(`/api/keys/${encodeURIComponent(forSel)}`, { method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify({ data: text, paste: true }) })
    .then(() => { if (forSel === sel) refreshTerm(false); })
    .catch(() => { /* transient */ });
});

refreshPanel();
setInterval(refreshPanel, 4000);
setInterval(() => refreshTerm(false), 500);
setInterval(() => { if (Date.now() < fastPollUntil) refreshTerm(false); }, 150); // tight loop after sends
</script>
