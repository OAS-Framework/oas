<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>oas — agents</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  /* ── Semantic design tokens. Dark and light palettes both hold WCAG AA
     (≥4.5:1) for body text; muted text stays ≥4.5:1 against panel surfaces. ── */
  :root, [data-theme="dark"] {
    --bg: #0e1116;          /* app background */
    --surface: #161b22;     /* cards, sidebar */
    --surface-2: #1c2129;   /* hover / raised */
    --border: #2d333c;
    --fg: #e6edf3;          /* primary text  (13.9:1 on bg) */
    --muted: #9aa4b2;       /* secondary text (5.6:1 on surface) */
    --faint: #6e7681;       /* tertiary/disabled */
    --accent: #4493f8;      /* interactive */
    --accent-fg: #ffffff;
    --ok: #3fb950; --warn: #d29922; --danger: #f85149;
    --chip-bg: #21262e; --chip-fg: #adb6c2;
    --sel: #1f6feb26;       /* selected wash */
    --term-bg: #0a0d12;     /* session surface follows the theme */
    --term-fg: #e6edf3;
    --term-sel: #264f78;
    --shadow: 0 1px 3px rgb(0 0 0 / .4);
  }
  [data-theme="light"] {
    /* Slightly solarised light — warm paper surfaces (Solarized base3/base2
       tints), ink and accents kept AA-readable on them. */
    --bg: #f3eddd;
    --surface: #fdf6e3;
    --surface-2: #f0e9d2;
    --border: #ddd4bc;
    --fg: #37424a;          /* 9.9:1 on surface */
    --muted: #657b83;       /* solarized base00 — 4.9:1 */
    --faint: #93a1a1;       /* solarized base1 */
    --accent: #1f6fb2;
    --accent-fg: #ffffff;
    --ok: #667f00; --warn: #9a6a00; --danger: #c73f3f;
    --chip-bg: #ede5cc; --chip-fg: #62707a;
    --sel: #1f6fb21f;
    --term-bg: #fdf6e3;     /* solarized-light session surface */
    --term-fg: #586e75;
    --term-sel: #d3c9a8;
    --shadow: 0 1px 3px rgb(88 110 117 / .14);
  }

  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--fg); height: 100vh; display: flex; flex-direction: column;
         font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         -webkit-font-smoothing: antialiased; }

  /* ── Header ── */
  header { padding: 0 20px; height: 52px; border-bottom: 1px solid var(--border); display: flex; align-items: center;
           gap: 14px; background: var(--surface); flex: none; }
  header h1 { font-size: 14px; margin: 0; font-weight: 650; letter-spacing: .01em; }
  header h1 .logo { color: var(--accent); }
  .hmeta { color: var(--muted); font-size: 12px; }
  .spacer { flex: 1; }
  .iconbtn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 8px;
             width: 32px; height: 32px; cursor: pointer; font-size: 15px; line-height: 1; }
  .iconbtn:hover { color: var(--fg); border-color: var(--faint); }
  #wssel { background: var(--surface-2); color: var(--fg); border: 1px solid var(--border); border-radius: 8px;
           padding: 5px 10px; font: 12.5px inherit; font-weight: 600; cursor: pointer; outline: none; }
  #wssel:hover, #wssel:focus { border-color: var(--accent); }

  main { flex: 1; display: flex; min-height: 0; }

  /* ── Sidebar / roster ── */
  #side { width: 340px; min-width: 280px; max-width: 420px; border-right: 1px solid var(--border);
          background: var(--surface); display: flex; flex-direction: column; }
  #filterbar { padding: 12px 12px 8px; display: flex; gap: 8px; }
  #filter { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--fg);
            border-radius: 8px; padding: 7px 11px; font-size: 13px; outline: none; }
  #filter:focus { border-color: var(--accent); }
  #filter::placeholder { color: var(--faint); }
  #groups { flex: 1; overflow-y: auto; padding: 0 8px 12px; }

  .group { margin-top: 10px; }
  .ghead { display: flex; align-items: center; gap: 8px; padding: 4px 8px; cursor: pointer; user-select: none;
           color: var(--muted); font-size: 11px; font-weight: 650; text-transform: uppercase; letter-spacing: .06em; }
  .ghead:hover { color: var(--fg); }
  .ghead .tri { transition: transform .12s; font-size: 9px; }
  .group.closed .tri { transform: rotate(-90deg); }
  .ghead .count { margin-left: auto; font-weight: 500; color: var(--faint); text-transform: none; letter-spacing: 0; }
  .group.closed .glist { display: none; }

  .repo { margin: 2px 0 2px 6px; }
  .rhead { color: var(--faint); font-size: 11.5px; padding: 5px 8px 2px; font-weight: 600; }

  .inst { padding: 8px 10px 8px 12px; border-radius: 8px; cursor: pointer; margin: 1px 0;
          border: 1px solid transparent; position: relative; }
  .inst:hover { background: var(--surface-2); }
  .inst.sel { background: var(--sel); border-color: var(--accent); }
  .inst.idle { opacity: .62; }
  .inst.child { margin-left: 18px; }
  .inst.child::before { content: ""; position: absolute; left: -10px; top: 0; bottom: 50%; width: 9px;
                        border-left: 1px solid var(--border); border-bottom: 1px solid var(--border);
                        border-bottom-left-radius: 6px; }
  .iname { font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 7px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--faint); flex: none; }
  .dot.on { background: var(--ok); box-shadow: 0 0 0 3px color-mix(in srgb, var(--ok) 22%, transparent); }
  .itask { color: var(--muted); font-size: 12px; margin-top: 3px; overflow: hidden; text-overflow: ellipsis;
           white-space: nowrap; }
  .imeta { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; align-items: center; }
  .chip { background: var(--chip-bg); color: var(--chip-fg); border-radius: 999px; font-size: 10.5px;
          padding: 1px 8px; font-weight: 550; }
  .chip.dirty { color: var(--warn); }
  .chip.rt { color: var(--accent); }

  /* ── Main view ── */
  #view { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); }
  #vhead { padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--surface); display: none; }
  #vhead .row1 { display: flex; align-items: center; gap: 10px; }
  #vhead .title { font-weight: 650; font-size: 15px; }
  #vhead .badge { font-size: 11px; padding: 2px 9px; border-radius: 999px; font-weight: 600; }
  .badge.on { background: color-mix(in srgb, var(--ok) 16%, transparent); color: var(--ok); }
  .badge.off { background: var(--chip-bg); color: var(--muted); }
  #vhead .row2 { color: var(--muted); font-size: 12.5px; margin-top: 4px; display: flex; gap: 16px; flex-wrap: wrap; }
  #vhead .row2 b { color: var(--fg); font-weight: 550; }
  #vhead .actions { margin-left: auto; display: flex; gap: 8px; }
  button.act { background: var(--surface); color: var(--fg); border: 1px solid var(--border); border-radius: 8px;
               padding: 6px 13px; cursor: pointer; font-size: 12.5px; font-weight: 550; }
  button.act:hover { border-color: var(--accent); color: var(--accent); }
  button.act.danger:hover { border-color: var(--danger); color: var(--danger); }

  /* ── Chat view — pi-style terminal transcript: monospace on the session
     surface; user prompts as bordered blocks (pi's prompt box), agent text as
     plain prose, tool calls inline with their output visible and dimmed. ── */
  #chat { flex: 1; overflow-y: auto; padding: 22px 0 30px;
          background: var(--term-bg); color: var(--term-fg);
          font: 13px/1.55 "SF Mono", ui-monospace, SFMono-Regular, Menlo, monospace; }
  .turn { max-width: 900px; margin: 0 auto; padding: 0 26px; }
  .turn + .turn { margin-top: 16px; }

  /* user prompt: pi's boxed block — accent rail + tinted surface, full width */
  .turn.user .utext { border-left: 3px solid var(--accent);
          background: color-mix(in srgb, var(--accent) 9%, var(--term-bg));
          border-radius: 6px; padding: 10px 14px; white-space: pre-wrap; word-break: break-word;
          color: color-mix(in srgb, var(--accent) 55%, var(--term-fg)); font-weight: 500; }

  .turn.ai .atext { white-space: pre-wrap; word-break: break-word; margin: 8px 0; }
  .turn.ai .atext code { background: color-mix(in srgb, var(--term-fg) 10%, transparent);
          border-radius: 4px; padding: 0 4px; }
  .turn.ai .atext code.block { display: block; padding: 10px 12px; margin: 8px 0; overflow-x: auto;
          background: color-mix(in srgb, var(--term-fg) 6%, transparent);
          border-radius: 6px; border: none; }
  .turn.ai .atext b { color: color-mix(in srgb, var(--term-fg) 60%, #fff); }
  [data-theme="light"] .turn.ai .atext b { color: #1f2328; }

  /* tool call: pi-style inline line + dimmed output underneath */
  .tool { margin: 8px 0; }
  .toolhead { display: flex; align-items: baseline; gap: 8px; cursor: pointer; user-select: none; }
  .toolhead:hover .tcmd { text-decoration: underline; }
  .toolhead .tverb { color: var(--ok); font-weight: 700; flex: none; }
  .toolhead.running .tverb { color: var(--warn); }
  .toolhead .tcmd { color: var(--term-fg); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .toolout { color: color-mix(in srgb, var(--term-fg) 62%, transparent); white-space: pre-wrap;
             word-break: break-all; font-size: 12px; padding: 3px 0 0 18px; }
  .toolout.full { max-height: 360px; overflow-y: auto;
                  color: color-mix(in srgb, var(--term-fg) 80%, transparent); }
  .tool .more { color: color-mix(in srgb, var(--term-fg) 40%, transparent); padding-left: 18px;
                font-size: 11px; cursor: pointer; }
  .tool .more:hover { color: var(--term-fg); }

  /* workflow (pi dynamic-workflows): a distinct boxed panel, like pi renders it */
  .tool.wf { border: 1px solid color-mix(in srgb, var(--term-fg) 18%, transparent);
             border-radius: 8px; padding: 10px 14px; margin: 10px 0;
             background: color-mix(in srgb, var(--term-fg) 5%, transparent); }
  .wfhead { display: flex; align-items: baseline; gap: 8px; cursor: pointer; user-select: none; }
  .wfmark { color: var(--violet, #a78bfa); }
  .tool.wf .wfname { font-weight: 700; color: var(--term-fg); }
  .tool.wf.running .wfmark { animation: pulse 1.2s ease-in-out infinite; }
  .wfstate { margin-left: auto; font-size: 11.5px; color: color-mix(in srgb, var(--term-fg) 60%, transparent);
             display: inline-flex; align-items: center; gap: 6px; }
  .tool.wf.done .wfstate { color: var(--ok); }
  .tool.wf.failed .wfstate { color: var(--danger); }
  .tool.wf.running .wfstate { color: var(--warn); }
  .wfdesc { color: color-mix(in srgb, var(--term-fg) 62%, transparent); font-size: 12px; margin-top: 4px; }
  .tool.wf .toolout.full { margin-top: 8px; }
  .tool.wf .more { padding-left: 0; margin-top: 6px; }

  .thinking { color: color-mix(in srgb, var(--term-fg) 55%, transparent); font-size: 12px; margin: 6px 0; }
  .thinking summary { cursor: pointer; list-style: none; user-select: none; }
  .thinking summary::before { content: "▸ "; }
  details[open].thinking summary::before { content: "▾ "; }
  .thinking .tbody { font-style: italic; white-space: pre-wrap;
                     border-left: 2px solid color-mix(in srgb, var(--term-fg) 25%, transparent);
                     padding-left: 12px; margin-top: 4px; }

  /* ── Loading states ── */
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100% { opacity: .35; } 50% { opacity: 1; } }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: .2; } }
  .spinner { width: 14px; height: 14px; border: 2px solid color-mix(in srgb, var(--term-fg) 25%, transparent);
             border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite;
             display: inline-block; vertical-align: -2px; }
  .loading-block { display: flex; align-items: center; gap: 10px; justify-content: center;
                   padding: 48px 0; color: color-mix(in srgb, var(--term-fg) 60%, transparent); }
  .toolhead.running .tverb { animation: pulse 1.2s ease-in-out infinite; }
  .working { display: flex; align-items: center; gap: 8px; padding: 10px 0 0;
             color: color-mix(in srgb, var(--term-fg) 65%, transparent); font-size: 12px; }
  .working .dots span { animation: blink 1.4s infinite; }
  .working .dots span:nth-child(2) { animation-delay: .2s; }
  .working .dots span:nth-child(3) { animation-delay: .4s; }
  .pending { opacity: .55; }
  .pending .utext { border-left-style: dashed; }

  .turn .tstamp { font-size: 10.5px; color: var(--faint); margin-top: 3px; }


  #composer { border-top: 1px solid var(--border); background: var(--surface); padding: 12px 18px;
              display: none; gap: 10px; align-items: flex-end; }
  #msgwrap { flex: 1; position: relative; }
  #msg { width: 100%; background: var(--bg); color: var(--fg); border: 1px solid var(--border);
         border-radius: 18px; padding: 11px 46px 11px 16px;
         font: 13.5px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         outline: none; resize: none; overflow-y: auto;
         min-height: 44px; max-height: 176px; box-sizing: border-box; display: block;
         transition: max-height .18s ease, min-height .18s ease; }
  #msg:focus { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent); }
  #msg::placeholder { color: var(--faint); }
  /* Ctrl-E expanded editor — a taller, calmer writing surface (not fullscreen) */
  #composer.expanded #msg { min-height: 220px; max-height: 46vh; border-radius: 12px;
         font: 13px/1.55 "SF Mono", ui-monospace, SFMono-Regular, Menlo, monospace; }
  #msghint { position: absolute; right: 14px; bottom: 7px; font-size: 10px; color: var(--faint);
             pointer-events: none; user-select: none; }
  #composer.expanded #msghint { display: none; }
  #expandbtn { position: absolute; right: 10px; top: 8px; background: none; border: none; cursor: pointer;
               color: var(--faint); font-size: 13px; padding: 2px 4px; border-radius: 5px; }
  #expandbtn:hover { color: var(--fg); background: var(--surface-2); }
  #sendbtn { background: var(--accent); color: var(--accent-fg); border: none; border-radius: 50%;
             width: 40px; height: 40px; cursor: pointer; font-size: 16px; font-weight: 600; flex: none;
             display: inline-flex; align-items: center; justify-content: center; margin-bottom: 2px; }
  #sendbtn:hover { filter: brightness(1.1); }

  .empty { color: var(--muted); text-align: center; padding: 60px 30px; font-size: 13.5px; }
  .empty .big { font-size: 32px; display: block; margin-bottom: 12px; opacity: .5; }
  .empty code { background: var(--chip-bg); border-radius: 6px; padding: 1px 7px; font-size: 12px; }

  /* ANSI palette — dark-surface set, with a solarized-leaning override for light */
  .a30{color:#768390}.a31{color:#ff7b72}.a32{color:#4ac26b}.a33{color:#d9a032}.a34{color:#6cb2ff}.a35{color:#c297ff}.a36{color:#4ed1db}.a37{color:#c3ccd6}
  .a90{color:#8b949e}.a91{color:#ffa198}.a92{color:#63e084}.a93{color:#edbb4a}.a94{color:#8cc5ff}.a95{color:#d5b3ff}.a96{color:#70e0e8}.a97{color:#f5f9ff}
  [data-theme="light"] .a30{color:#93a1a1}[data-theme="light"] .a31{color:#dc322f}[data-theme="light"] .a32{color:#859900}[data-theme="light"] .a33{color:#b58900}
  [data-theme="light"] .a34{color:#268bd2}[data-theme="light"] .a35{color:#d33682}[data-theme="light"] .a36{color:#2aa198}[data-theme="light"] .a37{color:#586e75}
  [data-theme="light"] .a90{color:#839496}[data-theme="light"] .a91{color:#cb4b16}[data-theme="light"] .a92{color:#6b7f00}[data-theme="light"] .a93{color:#8f6c00}
  [data-theme="light"] .a94{color:#1f6fb2}[data-theme="light"] .a95{color:#b02e6d}[data-theme="light"] .a96{color:#1f8a82}[data-theme="light"] .a97{color:#37424a}
  .ab{font-weight:700}.ad{opacity:.9}.ai{font-style:italic}.au{text-decoration:underline}
</style>
</head>
<body>
<header>
  <h1><span class="logo">●</span> oas agents</h1>
  <select id="wssel" style="display:none"></select>
  <span class="hmeta" id="teamline"></span>
  <span class="spacer"></span>
  <span class="hmeta" id="stamp"></span>
  <button class="iconbtn" id="themebtn" title="Toggle light/dark">◐</button>
</header>
<main>
  <div id="side">
    <div id="filterbar"><input id="filter" placeholder="Filter agents, repos, tasks…" autocomplete="off"></div>
    <div id="groups"></div>
  </div>
  <div id="view">
    <div id="vhead">
      <div class="row1">
        <span class="title" id="vtitle"></span>
        <span class="badge" id="vbadge"></span>
        <span class="actions">
          <button class="act danger" id="intbtn" title="Send Ctrl-C to the session">Interrupt</button>
        </span>
      </div>
      <div class="row2" id="vinfo"></div>
    </div>
    <div id="chat"><div class="empty"><span class="big">⌥</span>Select an instance to follow its session.<br>What you type goes straight into the agent's terminal.</div></div>
    <div id="composer">
      <div id="msgwrap">
        <textarea id="msg" rows="1" placeholder="Message the agent — Enter sends, Shift+Enter new line, Ctrl+E expand" autocomplete="off"></textarea>
        <button id="expandbtn" title="Expand editor (Ctrl+E)">⤢</button>
        <span id="msghint">⇧↵ newline · ^E expand</span>
      </div>
      <button id="sendbtn" title="Send">↑</button>
    </div>
  </div>
</main>
<script>
const $ = (id) => document.getElementById(id);
let panel = { instances: [] };
let sel = null;
let filterText = "";
const closedGroups = new Set(JSON.parse(localStorage.getItem("oasweb.closed") || "[]"));

/* ── theme ── */
const savedTheme = localStorage.getItem("oasweb.theme");
const sysDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
document.documentElement.dataset.theme = savedTheme || (sysDark ? "dark" : "light");
$("themebtn").onclick = () => {
  const next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
  document.documentElement.dataset.theme = next;
  localStorage.setItem("oasweb.theme", next);
};

/* ── grouping: workspace → repo → instances (children indented under parents) ── */
function groupInstances(list) {
  const workspaces = new Map();
  for (const i of list) {
    const wsName = (i.workspace || "?").split("/").pop();
    if (!workspaces.has(wsName)) workspaces.set(wsName, new Map());
    const repos = workspaces.get(wsName);
    const rName = i.repoName || "?";
    if (!repos.has(rName)) repos.set(rName, []);
    repos.get(rName).push(i);
  }
  // Order instances inside a repo: roots first (running first), children after their parent.
  for (const repos of workspaces.values()) {
    for (const [rName, items] of repos) {
      const byName = new Map(items.map(i => [i.instance, i]));
      const roots = items.filter(i => !i.parentInstance || !byName.has(i.parentInstance));
      const kids = (p) => items.filter(i => i.parentInstance === p.instance);
      const rank = (a, b) => (a.running === b.running ? a.instance.localeCompare(b.instance) : a.running ? -1 : 1);
      roots.sort(rank);
      const ordered = [];
      const walk = (i, depth) => { ordered.push({ ...i, depth }); kids(i).sort(rank).forEach(k => walk(k, depth + 1)); };
      roots.forEach(r => walk(r, 0));
      for (const i of items) if (!ordered.some(o => o.instance === i.instance)) ordered.push({ ...i, depth: 0 });
      repos.set(rName, ordered);
    }
  }
  return workspaces;
}

function matches(i) {
  if (!filterText) return true;
  const t = filterText.toLowerCase();
  return [i.instance, i.agent, i.repoName, i.task, i.branch].some(v => String(v || "").toLowerCase().includes(t));
}

function renderRoster() {
  const el = $("groups"); el.innerHTML = "";
  const visible = panel.instances.filter(matches);
  if (!panel.instances.length) {
    el.innerHTML = '<div class="empty"><span class="big">◎</span>No instances yet.<br>Spawn one with <code>oas spawn &lt;agent&gt;</code>.</div>';
    return;
  }
  if (!visible.length) { el.innerHTML = '<div class="empty">Nothing matches the filter.</div>'; return; }
  const workspaces = groupInstances(visible);
  const multiWs = workspaces.size > 1;
  for (const [wsName, repos] of workspaces) {
    const g = document.createElement("div");
    const gid = "ws:" + wsName;
    g.className = "group" + (closedGroups.has(gid) ? " closed" : "");
    const total = [...repos.values()].reduce((n, v) => n + v.length, 0);
    const runningN = [...repos.values()].flat().filter(i => i.running).length;
    if (multiWs || true) {
      const h = document.createElement("div");
      h.className = "ghead";
      h.innerHTML = `<span class="tri">▾</span> ${wsName} <span class="count">${runningN}/${total} running</span>`;
      h.onclick = () => { g.classList.toggle("closed"); g.classList.contains("closed") ? closedGroups.add(gid) : closedGroups.delete(gid);
                          localStorage.setItem("oasweb.closed", JSON.stringify([...closedGroups])); };
      g.appendChild(h);
    }
    const list = document.createElement("div"); list.className = "glist";
    const multiRepo = repos.size > 1;
    for (const [rName, items] of repos) {
      const rbox = document.createElement("div"); rbox.className = "repo";
      if (multiRepo) { const rh = document.createElement("div"); rh.className = "rhead"; rh.textContent = rName; rbox.appendChild(rh); }
      for (const i of items) {
        const d = document.createElement("div");
        d.className = "inst" + (sel === i.instance ? " sel" : "") + (i.running ? "" : " idle") + (i.depth ? " child" : "");
        d.innerHTML = `
          <div class="iname"><span class="dot ${i.running ? "on" : ""}"></span>${i.instance}</div>
          <div class="itask">${(i.task || "").slice(0, 100)}</div>
          <div class="imeta">
            <span class="chip rt">${i.runtime}</span>
            <span class="chip">${i.work}${i.branch ? " · " + i.branch : ""}</span>
            ${i.git && i.git.dirty ? `<span class="chip dirty">±${i.git.dirty}</span>` : ""}
          </div>`;
        d.onclick = () => select(i.instance);
        rbox.appendChild(d);
      }
      list.appendChild(rbox);
    }
    g.appendChild(list);
    el.appendChild(g);
  }
}

let currentWs = localStorage.getItem("oasweb.ws") || "";
async function refreshPanel() {
  const r = await fetch(`/api/panel${currentWs ? `?ws=${encodeURIComponent(currentWs)}` : ""}`);
  panel = await r.json();
  if (panel.workspace) currentWs = panel.workspace.id;
  // workspace switcher — shown when the server watches more than one
  const sel2 = $("wssel");
  if ((panel.workspaces || []).length > 1) {
    sel2.style.display = "";
    const options = panel.workspaces.map(w => `<option value="${w.id}" ${w.id === currentWs ? "selected" : ""}>${w.name}${w.team ? ` · ${w.team.name}` : ""}</option>`).join("");
    if (sel2.innerHTML !== options) sel2.innerHTML = options;
    sel2.value = currentWs;
  } else sel2.style.display = "none";
  $("teamline").textContent = panel.team ? `team ${panel.team.name}` : "";
  $("stamp").textContent = `${panel.running} running · ${panel.instances.length} total`;
  renderRoster();
}
$("wssel").addEventListener("change", (e) => {
  currentWs = e.target.value;
  localStorage.setItem("oasweb.ws", currentWs);
  sel = null; lastChatSig = ""; pendingSends.length = 0;
  $("vhead").style.display = "none"; $("composer").style.display = "none";
  $("chat").innerHTML = '<div class="empty"><span class="big">⌥</span>Select an instance to follow its session.</div>';
  refreshPanel();
});

/* ── session (chat view) ── */
const openTools = new Set();

function select(name) {
  sel = name;
  const i = panel.instances.find(x => x.instance === name);
  $("vhead").style.display = "block";
  $("composer").style.display = "flex";
  $("vtitle").textContent = name;
  $("vbadge").textContent = i.running ? "running" : "idle";
  $("vbadge").className = "badge " + (i.running ? "on" : "off");
  $("vinfo").innerHTML = [
    `soul <b>${i.agent}</b>`,
    `repo <b>${i.repoName}</b>${i.branch ? ` @ <b>${i.branch}</b>` : ""}`,
    `mode <b>${i.work}</b>`,
    `runtime <b>${i.runtime}</b>${i.model ? ` (${i.model})` : ""}`,
    i.next ? `next: ${i.next.slice(0, 110)}` : "",
  ].filter(Boolean).map(x => `<span>${x}</span>`).join("");
  renderRoster();
  lastChatSig = "";
  lastChatData = null; // never re-render another instance's cached transcript
  chatReq++;           // invalidate any in-flight fetch for the previous instance
  pendingSends.length = 0;
  $("chat").innerHTML = '<div class="loading-block"><span class="spinner"></span> Loading session…</div>';
  refreshChat(true);
  $("msg").focus();
}

/* messages you sent that the transcript has not shown yet — rendered
   immediately as pending (dashed rail) so a send never feels swallowed */
const pendingSends = [];
let fastPollUntil = 0;
async function sendMsg() {
  const input = $("msg"); const text = input.value;
  if (!sel || !text.trim()) return;
  input.value = "";
  $("composer").classList.remove("expanded");
  autosize();
  pendingSends.push(text);
  lastChatSig = ""; renderChat(lastChatData, true); // pending block + thinking indicator, instantly
  fastPollUntil = Date.now() + 20000; // tight polling right after a send
  await fetch(`/api/send/${sel}`, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ text }) });
  refreshChat(true);
}
$("sendbtn").onclick = sendMsg;

/* composer: auto-grow textarea, Enter sends / Shift+Enter newline, Ctrl-E expands.
   Native textarea keeps the classic editing keys (⌘A/C/V/Z, option-arrows, etc.). */
const msgEl = $("msg");
function autosize() {
  msgEl.style.height = "auto";
  msgEl.style.height = Math.min(msgEl.scrollHeight, $("composer").classList.contains("expanded") ? window.innerHeight * .46 : 176) + "px";
}
function toggleExpand() {
  $("composer").classList.toggle("expanded");
  autosize(); msgEl.focus();
}
msgEl.addEventListener("input", autosize);
msgEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMsg(); return; }
  if (e.key === "e" && e.ctrlKey && !e.metaKey && !e.altKey) { e.preventDefault(); toggleExpand(); return; }
  if (e.key === "Escape" && $("composer").classList.contains("expanded")) { e.preventDefault(); toggleExpand(); }
});
$("expandbtn").onclick = toggleExpand;
$("intbtn").onclick = async () => { if (sel) { await fetch(`/api/interrupt/${sel}`, { method: "POST" }); setTimeout(() => refreshChat(true), 350); } };
$("filter").addEventListener("input", (e) => { filterText = e.target.value; renderRoster(); });

/* ── chat rendering — Codex-app style: user blocks, prose, grouped "Worked" activity ── */
function toolCommand(t) {
  const a = t.args || {};
  if (t.name === "bash") return { verb: "$", cmd: a.command || "" };
  if (t.name === "read") return { verb: "Read", cmd: a.path || a.file_path || "" };
  if (t.name === "edit") return { verb: "Edited", cmd: a.path || a.file_path || "" };
  if (t.name === "write") return { verb: "Wrote", cmd: a.path || a.file_path || "" };
  if (t.name === "workflow") {
    const meta = workflowMeta(t);
    return { verb: "Workflow", cmd: meta.name || "dynamic workflow" };
  }
  const first = Object.values(a).find(v => typeof v === "string");
  return { verb: t.name, cmd: first || JSON.stringify(a).slice(0, 120) };
}
/* pi dynamic-workflows extension: the tool call carries a JS script whose
   `export const meta = { name, description }` names the workflow. */
function workflowMeta(t) {
  const script = String((t.args || {}).script || "");
  const name = (script.match(/meta\s*=\s*\{[^}]*?name:\s*['"`]([^'"`]+)['"`]/) || [])[1];
  const description = (script.match(/meta\s*=\s*\{[^}]*?description:\s*['"`]([^'"`]+)['"`]/) || [])[1];
  return { name, description };
}
function workflowResult(t) {
  const out = String(t.result || "");
  const head = (out.match(/^Workflow\s+(\S+)\s+(completed|failed)[^\n]*/) || [])[0];
  const agents = (out.match(/with\s+(\d+)\s+agent/) || [])[1];
  return { head, agents, body: out };
}
function escapeHtml(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function agentLabel() {
  const i = panel.instances.find(x => x.instance === sel);
  return i ? i.agent : "agent";
}
function miniMarkdown(s) {
  return escapeHtml(s)
    .replace(/```\w*\n?([\s\S]*?)```/g, (m, code) => `<code class="block">${code.replace(/\n$/, "")}</code>`)
    .replace(/`([^`\n]+)`/g, "<code>$1</code>")
    .replace(/\*\*([^*\n]+)\*\*/g, "<b>$1</b>");
}
const PREVIEW_LINES = 5;
function workflowHtml(tool, key) {
  const open = openTools.has(key);
  const running = tool.result === null;
  const meta = workflowMeta(tool);
  const res = running ? null : workflowResult(tool);
  const failed = res && /failed/.test(res.head || "");
  return `<div class="tool wf ${running ? "running" : failed ? "failed" : "done"}">
    <div class="wfhead" onclick="toggleTool('${key}')">
      <span class="wfmark">◆</span>
      <span class="wfname">Workflow: ${escapeHtml(meta.name || "dynamic")}</span>
      <span class="wfstate">${running ? '<span class="spinner"></span> running' : failed ? "✗ failed" : `✓ completed${res.agents ? ` · ${res.agents} agents` : ""}`}</span>
    </div>
    ${meta.description ? `<div class="wfdesc">${escapeHtml(meta.description)}</div>` : ""}
    ${!running && open ? `<div class="toolout full">${escapeHtml(res.body)}</div><div class="more" onclick="toggleTool('${key}')">collapse</div>`
      : !running ? `<div class="more" onclick="toggleTool('${key}')">show result</div>` : ""}
  </div>`;
}
function toolHtml(tool, key) {
  if (tool.name === "workflow") return workflowHtml(tool, key);
  const open = openTools.has(key);
  const { verb, cmd } = toolCommand(tool);
  const running = tool.result === null;
  const out = (tool.result || "").replace(/\n+$/, "");
  const lines = out ? out.split("\n") : [];
  const preview = lines.slice(0, PREVIEW_LINES).join("\n");
  const hidden = lines.length - PREVIEW_LINES;
  return `<div class="tool">
    <div class="toolhead ${running ? "running" : ""}" onclick="toggleTool('${key}')">
      <span class="tverb">${running ? "●" : "✓"} ${escapeHtml(verb)}</span><span class="tcmd">${escapeHtml(cmd)}</span>
    </div>
    ${running ? "" : open
      ? `<div class="toolout full">${escapeHtml(out || "(no output)")}</div><div class="more" onclick="toggleTool('${key}')">collapse</div>`
      : preview
        ? `<div class="toolout">${escapeHtml(preview)}</div>${hidden > 0 ? `<div class="more" onclick="toggleTool('${key}')">… ${hidden} more lines</div>` : ""}`
        : ""}
  </div>`;
}
function turnHtml(t, idx) {
  if (t.role === "user") {
    return `<div class="turn user"><div class="utext">${escapeHtml(t.text)}</div></div>`;
  }
  let inner = "";
  if (t.thinking) inner += `<details class="thinking"><summary>thinking</summary><div class="tbody">${escapeHtml(t.thinking)}</div></details>`;
  for (const [j, tool] of (t.tools || []).entries()) inner += toolHtml(tool, `${idx}:${j}`);
  if (t.text) inner += `<div class="atext">${miniMarkdown(t.text)}</div>`;
  if (!inner) return "";
  return `<div class="turn ai">${inner}</div>`;
}
window.toggleTool = (key) => {
  openTools.has(key) ? openTools.delete(key) : openTools.add(key);
  lastChatSig = ""; refreshChat(false);
};
let lastChatSig = "";
let lastChatData = null;
function renderChat(d, scroll) {
  const box = $("chat");
  if (!d) return;
  if (!d.available) { box.innerHTML = '<div class="empty"><span class="big">⎀</span>No session transcript found for this instance.</div>'; return; }
  // clear pending sends once they appear in the transcript
  const shown = new Set(d.turns.filter(t => t.role === "user").map(t => t.text.trim()));
  for (let i = pendingSends.length - 1; i >= 0; i--) if (shown.has(pendingSends[i].trim())) pendingSends.splice(i, 1);
  const nearBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 120;
  let html = d.turns.map(turnHtml).join("") || "";
  for (const text of pendingSends) html += `<div class="turn user pending"><div class="utext">${escapeHtml(text)}</div></div>`;
  // live indicator: working when a tool call is in flight, a send is pending,
  // or the last transcript turn is the human's (the agent is thinking/streaming
  // — its reply only lands in the log when a block completes)
  const last = d.turns.at(-1);
  const busy = pendingSends.length > 0
    || (last && last.role === "user")
    || (last && last.role === "assistant" && (last.tools || []).some(t => t.result === null));
  if (busy) html += `<div class="turn ai"><div class="working"><span class="spinner"></span> ${last?.role === "user" || pendingSends.length ? "agent is thinking" : "agent is working"}<span class="dots"><span>.</span><span>.</span><span>.</span></span></div></div>`;
  box.innerHTML = html || '<div class="empty">No messages yet.</div>';
  if (scroll || nearBottom) box.scrollTop = box.scrollHeight;
}
let chatReq = 0; // request generation — stale/out-of-order responses are discarded
async function refreshChat(scroll) {
  if (!sel) return;
  const forSel = sel;
  const myReq = ++chatReq;
  let d;
  try { const r = await fetch(`/api/chat/${encodeURIComponent(forSel)}?limit=150`); d = await r.json(); }
  catch { return; } // keep the last good render on transient fetch errors
  // A newer request finished first, or the user switched instance mid-flight:
  // this payload belongs to another view — never let it paint.
  if (myReq !== chatReq || forSel !== sel) return;
  lastChatData = d;
  const sig = forSel + ":" + JSON.stringify(d.turns.length) + (d.turns.at(-1)?.text || "") + (d.turns.at(-1)?.tools?.length || 0)
    + ":" + (d.turns.at(-1)?.tools || []).filter(t => t.result === null).length + ":" + pendingSends.length
    + ":" + (d.turns.at(-1)?.role || "");
  if (sig === lastChatSig && !scroll) return; // avoid re-render flicker
  lastChatSig = sig;
  renderChat(d, scroll);
}

refreshPanel();
setInterval(refreshPanel, 4000);
setInterval(() => refreshChat(false), 1500);
setInterval(() => { if (Date.now() < fastPollUntil) refreshChat(false); }, 400); // tight loop after sends
</script>
</body>
</html>
