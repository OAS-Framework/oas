<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'sha256-0Jdk9tmT9Tt8cjZwiacnC7eiFpnP3st50xHv+9r+lAw='; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" />
  <title>OAS Desktop</title>
  <script type="importmap">
  { "imports": {
      "marked": "../node_modules/marked/lib/marked.esm.js",
      "dompurify": "../node_modules/dompurify/dist/purify.es.mjs",
      "highlight.js": "./vendor/highlight.mjs"
  } }
  </script>
  <link rel="stylesheet" href="../node_modules/@xterm/xterm/css/xterm.css" />
  <link rel="stylesheet" href="theme.css" />
  <link rel="stylesheet" href="shell.css" />
  <script src="../node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="side-head">
        <label class="side-kicker" for="ws-select">OAS workspace</label>
        <select id="ws-select" aria-label="Active OAS workspace">
          <option value="">Resolving…</option>
        </select>
      </div>
      <nav id="nav"></nav>
      <section id="instance-roster" aria-label="Instances">
        <div class="ctx-head"><span>Instances</span><span class="ctx-count"></span></div>
        <input class="ctx-filter" placeholder="Filter instances…" autocomplete="off" aria-label="Filter instances">
        <div class="ctx-list"></div>
      </section>
      <div id="nav-foot"></div>
    </aside>
    <main id="main">
      <div id="tabbar" role="tablist" aria-label="Open terminals and artifacts"></div>
      <div id="stagehost"></div>
      <div id="tabhost" style="display:none"></div>
    </main>
  </div>
  <script type="module" src="shell.mjs"></script>
</body>
</html>
