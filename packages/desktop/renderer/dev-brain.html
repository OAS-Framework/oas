<!doctype html>
<!-- Standalone dev harness for the brain view. oas-web sends no CORS headers,
     so the page must share an origin with the API — use the bundled dev server:
       node capabilities/oas-web/bin/oas-web.mjs start --port 4820 --dir <ws>
       node packages/desktop/renderer/dev-serve.mjs        # http://127.0.0.1:4830
     dev-serve proxies /api/* to the oas-web port (same-origin).
     The real host is the desktop shell; this page only fakes ctx. -->
<html data-theme="dark">
<head><meta charset="utf-8"><title>brain view — dev harness</title>
<style>
  :root, [data-theme="dark"] { --bg:#0e1116; --surface:#161b22; --surface-2:#1c2129; --border:#2d333c;
    --fg:#e6edf3; --muted:#9aa4b2; --faint:#6e7681; --accent:#4493f8; --ok:#3fb950;
    --sel:#1f6feb26; --shadow:0 1px 3px rgb(0 0 0 / .4); }
  html, body, #host { height: 100%; margin: 0; background: var(--bg); }
</style></head>
<body>
<div id="host"></div>
<script type="module">
  import { mount } from "./views/brain.mjs";
  mount(document.getElementById("host"), {
    api: (pathname) => fetch(pathname), // same origin — dev-serve proxies /api/*
    openFile: (path) => alert("openFile → " + path),
    openTerminal: (instance) => alert("openTerminal → " + instance),
  });
</script>
</body>
</html>
