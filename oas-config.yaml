# OAS config for the oas framework repo — the first full OAS deployment.
# Messaging is not declared here: it resolves at the laptop level (aweb).
name: oas-framework

# ── Agent types (families) ── declared here by name; each soul opts in via
# `type: <name>` in its soul.yaml. Capability entries can target them.
agent-types:
  framework-authors:
    description: Agents that author and steward the OAS framework itself

capabilities:
  # Fundamental layers — exclusive slots; a capability entry or an explicit none.
  layers:
    knowledge:
      capability: oas.okf
      from: installed
      # injection-override: .agents/injections/capabilities/oas.okf.md
    # messaging: (unset — inherits from the laptop level: aweb)
    # Explicit none prevents an inherited task integration from occupying the
    # exclusive slot; integrations activate only through capability entries.
    tasks: none
  # Additive capabilities — non-exclusive; target global, agent-types, or souls.
  additive:
    oas.authoring:
      from: installed
      agent-types:
        framework-authors: true
      # injection-override: .agents/injections/capabilities/oas.authoring.md

# ── Work modes — optional per-mode env bootstrap.
# `setup:` runs inside each NEW worktree right after `git worktree add`.
work-modes:
  worktree:
    # setup: scripts/setup-worktree.sh

# ── OAS defaults — the framework's baseline instruction block.
oas:
  # injection-override: .agents/injections/oas-defaults/oas.md

# Extra unconditional instruction blocks for every instance in this workspace.
agents-md-injection:
  framework: injects/framework-workspace.md
